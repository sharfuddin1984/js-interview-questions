<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>100 JavaScript Interview Q&A</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d18;color:#e2e8f0;font-family:"Segoe UI",system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0d0d18}
::-webkit-scrollbar-thumb{background:#2d3748;border-radius:3px}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);border-bottom:1px solid #1e3a5f;padding:1.5rem 1rem 1rem;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.badge{font-size:.62rem;letter-spacing:.25em;color:#60a5fa;text-transform:uppercase;margin-bottom:.3rem}
h1{font-size:clamp(1.2rem,4vw,2rem);font-weight:800;background:linear-gradient(90deg,#60a5fa,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.sub{color:#64748b;font-size:.75rem;margin-top:.3rem}
.search-wrap{position:relative;max-width:460px;margin:.8rem auto 0}
.search-wrap span{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#60a5fa;pointer-events:none}
#searchInput{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(96,165,250,.3);border-radius:8px;padding:.55rem 1rem .55rem 2.2rem;color:#e2e8f0;font-size:.85rem;outline:none;font-family:inherit}
#searchInput:focus{border-color:#60a5fa}
#searchInput::placeholder{color:#475569}
.filters{background:#0d0d18;border-bottom:1px solid #1e293b;padding:.55rem .75rem;overflow-x:auto;white-space:nowrap}
.filters::-webkit-scrollbar{height:3px}
.filter-inner{display:inline-flex;gap:.35rem}
.fbtn{border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:.26rem .7rem;color:#94a3b8;font-size:.68rem;cursor:pointer;background:rgba(255,255,255,.04);font-family:inherit;transition:all .15s;white-space:nowrap}
.fbtn.active{color:#fff;border-color:transparent;font-weight:700}
.fbtn:hover:not(.active){background:rgba(255,255,255,.08)}
.stats{max-width:900px;margin:.5rem auto;padding:0 1rem;color:#475569;font-size:.72rem}
.list{max-width:900px;margin:0 auto;padding:0 .75rem 4rem}
.card{margin-bottom:.4rem;border-radius:10px;border:1px solid #1e293b;background:#0d0d18;overflow:hidden;transition:border-color .2s,background .2s}
.card.open{background:#111121;border-color:rgba(96,165,250,.2)}
.qhead{padding:.8rem 1rem;cursor:pointer;display:flex;align-items:flex-start;gap:.6rem;user-select:none}
.qhead:hover{background:rgba(255,255,255,.02)}
.qnum{min-width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;flex-shrink:0}
.qmeta{flex:1;min-width:0}
.qcat{display:block;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;font-weight:600;margin-bottom:.18rem}
.qtitle{font-size:.86rem;font-weight:600;color:#cbd5e1;line-height:1.4}
.card.open .qtitle{color:#f1f5f9}
.qright{display:flex;gap:.35rem;align-items:center;flex-shrink:0;padding-top:.1rem}
.bmbtn{background:none;border:none;cursor:pointer;font-size:.95rem;color:#374151;padding:.1rem;line-height:1;transition:color .15s}
.bmbtn.on{color:#f59e0b}
.chev{font-size:.7rem;display:inline-block;transition:transform .2s}
.card.open .chev{transform:rotate(180deg)}
.apanel{display:none;border-top:1px solid rgba(255,255,255,.06)}
.card.open .apanel{display:block}
.atext{padding:.9rem 1rem .7rem;font-size:.83rem;line-height:1.75;color:#94a3b8;white-space:pre-line}
.alabel{display:block;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:.4rem}
.codewrap{margin:0 1rem 1rem;border-radius:8px;overflow:hidden;border:1px solid #1e293b}
.codetop{display:flex;justify-content:space-between;align-items:center;background:#07070d;padding:.38rem .8rem;border-bottom:1px solid #1a2030}
.codelang{font-size:.6rem;color:#475569;letter-spacing:.06em;font-family:monospace}
.copybtn{background:rgba(255,255,255,.05);border:1px solid #2d3748;border-radius:4px;color:#64748b;font-size:.63rem;padding:.18rem .55rem;cursor:pointer;font-family:inherit;transition:all .2s}
.copybtn.ok{border-color:#34d399;color:#34d399;background:rgba(52,211,153,.1)}
pre.codebody{background:#05050b;padding:.85rem 1rem;overflow-x:auto;font-family:"JetBrains Mono","Fira Code","Courier New",monospace;font-size:.76rem;line-height:1.75;color:#e2e8f0;white-space:pre;margin:0}
pre.codebody::-webkit-scrollbar{height:4px}
pre.codebody::-webkit-scrollbar-thumb{background:#2d3748}
.kw{color:#a78bfa}.str{color:#34d399}.num{color:#f97316}.cmt{color:#4b5563;font-style:italic}
.empty{text-align:center;padding:3rem;color:#475569}

</style>
</head>
<body>

<script type="application/json" id="QA_DATA">
[{"id": 1, "cat": "Basics & Syntax", "q": "What is JavaScript and what is it used for?", "a": "JavaScript is a lightweight, interpreted, multi-paradigm programming language used to make web pages interactive. It runs in browsers (client-side) and on servers via Node.js (server-side).", "ex": "// Client-side: change text on click\ndocument.getElementById(\"btn\").addEventListener(\"click\", () => {\n  document.getElementById(\"btn\").textContent = \"Clicked!\";\n});\n\n// Server-side (Node.js)\nconst http = require(\"http\");\nhttp.createServer((req, res) => {\n  res.end(\"Hello from Node.js!\");\n}).listen(3000);"}, {"id": 2, "cat": "Basics & Syntax", "q": "What are the data types in JavaScript?", "a": "8 data types:\n\u2022 Primitives: String, Number, BigInt, Boolean, Undefined, Null, Symbol\n\u2022 Reference: Object (includes Arrays, Functions, Dates)", "ex": "let str  = \"Hello\";            // String\nlet num  = 42;                // Number\nlet big  = 9007199254740993n; // BigInt\nlet bool = true;              // Boolean\nlet undef;                    // Undefined\nlet nul  = null;              // Null\nlet sym  = Symbol(\"id\");      // Symbol\nlet obj  = { name: \"JS\" };   // Object\n\nconsole.log(typeof str);   // \"string\"\nconsole.log(typeof nul);   // \"object\"  \u2190 famous quirk!\nconsole.log(typeof undef); // \"undefined\""}, {"id": 3, "cat": "Basics & Syntax", "q": "What is the difference between null and undefined?", "a": "\u2022 undefined \u2014 variable declared but not assigned (JS sets automatically)\n\u2022 null \u2014 intentionally set to represent 'no value' (developer sets it)", "ex": "let x;         // undefined\nlet y = null;  // null \u2014 explicitly empty\n\nconsole.log(x);        // undefined\nconsole.log(y);        // null\nconsole.log(x == y);   // true  (loose \u2014 both \"empty\")\nconsole.log(x === y);  // false (strict \u2014 different types)"}, {"id": 4, "cat": "Basics & Syntax", "q": "What is the difference between == and ===?", "a": "\u2022 == (loose equality) \u2014 compares values after type coercion\n\u2022 === (strict equality) \u2014 compares value AND type (no coercion)\nAlways prefer ===.", "ex": "console.log(5 == \"5\");    // true  \u2014 \"5\" coerced to 5\nconsole.log(5 === \"5\");   // false \u2014 different types\n\nconsole.log(0 == false);  // true  \u2014 false \u2192 0\nconsole.log(0 === false); // false \u2014 number vs boolean\n\nconsole.log(null == undefined);  // true\nconsole.log(null === undefined); // false"}, {"id": 5, "cat": "Basics & Syntax", "q": "What are primitive vs reference types?", "a": "\u2022 Primitives (String, Number, Boolean, null, undefined, Symbol, BigInt) \u2014 stored by VALUE\n\u2022 Reference types (Object, Array, Function) \u2014 stored by REFERENCE (copying shares memory)", "ex": "// Primitive \u2014 copied by value\nlet a = 10, b = a;\nb = 20;\nconsole.log(a); // 10 \u2014 unchanged\n\n// Reference \u2014 copied by reference\nlet obj1 = { name: \"Alice\" };\nlet obj2 = obj1;\nobj2.name = \"Bob\";\nconsole.log(obj1.name); // \"Bob\" \u2014 both point same object!\n\n// Safe copy\nlet obj3 = { ...obj1 };\nobj3.name = \"Charlie\";\nconsole.log(obj1.name); // \"Bob\" \u2014 safe"}, {"id": 6, "cat": "Basics & Syntax", "q": "What is type coercion?", "a": "Type coercion is JS automatically (implicit) or manually (explicit) converting a value from one type to another.", "ex": "// Implicit\nconsole.log(\"5\" + 3);   // \"53\" \u2014 3 coerced to string\nconsole.log(\"5\" - 3);   // 2    \u2014 \"5\" coerced to number\nconsole.log(true + 1);  // 2    \u2014 true \u2192 1\nconsole.log(false + 1); // 1    \u2014 false \u2192 0\n\n// Explicit\nconsole.log(Number(\"42\"));   // 42\nconsole.log(String(100));    // \"100\"\nconsole.log(Boolean(0));     // false\nconsole.log(Boolean(\"hi\"));  // true"}, {"id": 7, "cat": "Basics & Syntax", "q": "What is the difference between let, const, and var?", "a": "\u2022 var \u2014 function-scoped, hoisted (undefined), can re-declare\n\u2022 let \u2014 block-scoped, hoisted (TDZ), no re-declare\n\u2022 const \u2014 block-scoped, must initialize, cannot reassign (object props can mutate)", "ex": "var x = 1; var x = 2; // OK \u2014 re-declared\nif (true) { var x = 3; } // leaks out of block\nconsole.log(x); // 3\n\nlet y = 1;\nif (true) { let y = 2; } // own scope\nconsole.log(y); // 1\n\nconst PI = 3.14;\n// PI = 3; // TypeError!\n\nconst user = { name: \"Alice\" };\nuser.name = \"Bob\"; // OK \u2014 property mutation allowed"}, {"id": 8, "cat": "Basics & Syntax", "q": "What is block-scope vs function-scope?", "a": "\u2022 Function-scope \u2014 var accessible anywhere inside the function\n\u2022 Block-scope \u2014 let/const limited to the { } block they're in", "ex": "function testVar() {\n  if (true) { var msg = \"function-scoped\"; }\n  console.log(msg); // accessible!\n}\n\nfunction testLet() {\n  if (true) {\n    let msg = \"block-scoped\";\n    console.log(msg); // accessible inside block\n  }\n  // console.log(msg); // ReferenceError!\n}\n\nfor (var i = 0; i < 3; i++) {}\nconsole.log(i); // 3 \u2014 leaks!\n\nfor (let j = 0; j < 3; j++) {}\n// console.log(j); // ReferenceError"}, {"id": 9, "cat": "Basics & Syntax", "q": "What is the difference between let and var?", "a": "1. Scope \u2014 var: function; let: block\n2. Hoisting \u2014 var: undefined; let: TDZ\n3. Re-declaration \u2014 var: OK; let: SyntaxError\n4. Global \u2014 var attaches to window; let does not", "ex": "// Scope\nfunction test() {\n  if (true) { var a = \"var\"; let b = \"let\"; }\n  console.log(a); // \"var\" \u2014 accessible\n  // console.log(b); // ReferenceError\n}\n\n// Hoisting\nconsole.log(x); // undefined (hoisted)\nvar x = 5;\n// console.log(y); // ReferenceError \u2014 TDZ\nlet y = 5;\n\n// Re-declaration\nvar c = 1; var c = 2; // OK\nlet d = 1;\n// let d = 2; // SyntaxError"}, {"id": 10, "cat": "Basics & Syntax", "q": "How do you declare and use variables?", "a": "Use const by default, let when reassignment is needed, avoid var. ES6 supports destructuring assignment.", "ex": "const name = \"Sharfuddin\";\nlet age = 25;\n\n// Template literals\nconsole.log(\"Hello, \" + name + \"! Age: \" + age);\n\n// Multiple declarations\nlet x = 1, y = 2, z = 3;\n\n// Array destructuring\nconst [first, second] = [10, 20];\n\n// Object destructuring\nconst { firstName, lastName } = { firstName: \"John\", lastName: \"Doe\" };\nconsole.log(firstName); // \"John\""}, {"id": 11, "cat": "Functions & Scope", "q": "What is a function in JavaScript?", "a": "A reusable block of code that performs a task. Functions are first-class citizens \u2014 assignable, passable as arguments, returnable from other functions.", "ex": "function greet(name) { return \"Hello, \" + name + \"!\"; }\nconsole.log(greet(\"Alice\")); // \"Hello, Alice!\"\n\n// Assigned to variable\nconst square = function(n) { return n * n; };\n\n// Passed as argument\nfunction runTwice(fn, val) { return fn(fn(val)); }\nconsole.log(runTwice(square, 2)); // 16\n\n// Returned from function\nfunction multiplier(factor) { return (num) => num * factor; }\nconst double = multiplier(2);\nconsole.log(double(5)); // 10"}, {"id": 12, "cat": "Functions & Scope", "q": "What is a function declaration vs expression?", "a": "\u2022 Declaration \u2014 uses function keyword at statement level; fully HOISTED\n\u2022 Expression \u2014 function assigned to variable; NOT hoisted (only variable hoisted as undefined)", "ex": "// Declaration \u2014 hoisted, works before declaration\nconsole.log(add(2, 3)); // 5\nfunction add(a, b) { return a + b; }\n\n// Expression \u2014 NOT hoisted\n// console.log(mul(2, 3)); // TypeError!\nconst mul = function(a, b) { return a * b; };\nconsole.log(mul(2, 3)); // 6\n\n// Named function expression\nconst factorial = function fact(n) {\n  return n <= 1 ? 1 : n * fact(n - 1);\n};\nconsole.log(factorial(5)); // 120"}, {"id": 13, "cat": "Functions & Scope", "q": "What is an arrow function?", "a": "Arrow functions (=>) are a concise ES6 syntax. No own 'this', no 'arguments', can't be constructors.", "ex": "// Regular vs Arrow\nconst add = function(a, b) { return a + b; };\nconst addArrow = (a, b) => a + b;\nconsole.log(addArrow(2, 3)); // 5\n\n// Single param \u2014 no parens needed\nconst square = n => n * n;\n\n// No params\nconst greet = () => \"Hello!\";\n\n// Multi-line needs return\nconst multiply = (a, b) => {\n  const result = a * b;\n  return result;\n};\n\n// 'this' difference \u2014 arrow inherits outer scope\nfunction Timer() {\n  this.seconds = 0;\n  setInterval(() => { this.seconds++; }, 1000);\n}"}, {"id": 14, "cat": "Functions & Scope", "q": "What is hoisting?", "a": "Hoisting moves declarations (not initializations) to the top of scope during compilation.\n\u2022 var \u2014 hoisted and initialized as undefined\n\u2022 let/const \u2014 hoisted but in Temporal Dead Zone (TDZ)\n\u2022 function declarations \u2014 fully hoisted", "ex": "// Function declarations fully hoisted\nsayHello(); // \"Hello!\" \u2014 works before declaration!\nfunction sayHello() { console.log(\"Hello!\"); }\n\n// var \u2014 hoisted as undefined\nconsole.log(x); // undefined (not ReferenceError)\nvar x = 10;\n\n// let/const \u2014 Temporal Dead Zone\n// console.log(y); // ReferenceError!\nlet y = 20;\n\n// Class \u2014 also in TDZ\n// const c = new MyClass(); // ReferenceError!\nclass MyClass {}"}, {"id": 15, "cat": "Functions & Scope", "q": "What is a closure?", "a": "A closure is a function that remembers variables from its outer scope even after the outer function has finished executing.", "ex": "function makeCounter() {\n  let count = 0; // outer variable\n\n  return function() {\n    count++;       // inner fn remembers 'count'\n    return count;\n  };\n}\n\nconst counter = makeCounter();\nconsole.log(counter()); // 1\nconsole.log(counter()); // 2\nconsole.log(counter()); // 3\n\n// Independent instances\nconst c1 = makeCounter();\nconst c2 = makeCounter();\nc1(); c1();\nc2();\nconsole.log(c1()); // 3\nconsole.log(c2()); // 2 \u2014 independent!"}, {"id": 16, "cat": "Functions & Scope", "q": "What is the module pattern?", "a": "Uses IIFE + closure to create private state with a public API. Prevents global namespace pollution.", "ex": "const Counter = (() => {\n  let _count = 0; // private\n\n  return {\n    increment() { _count++; },\n    decrement() { _count--; },\n    getCount()  { return _count; }\n  };\n})();\n\nCounter.increment();\nCounter.increment();\nconsole.log(Counter.getCount()); // 2\n// Counter._count \u2192 undefined (private!)"}, {"id": 17, "cat": "Functions & Scope", "q": "What is IIFE?", "a": "IIFE (Immediately Invoked Function Expression) runs immediately after definition. Creates a private scope to prevent global namespace pollution.", "ex": "// Basic IIFE\n(function() {\n  let secret = \"private\";\n  console.log(secret);\n})();\n\n// Arrow IIFE\n(() => console.log(\"Arrow IIFE\"))();\n\n// With parameter\n(function(name) {\n  console.log(\"Hello, \" + name);\n})(\"Alice\");\n\n// Returning a value\nconst result = (function() {\n  return 10 + 20;\n})();\nconsole.log(result); // 30"}, {"id": 18, "cat": "Functions & Scope", "q": "What is the difference between parameters and arguments?", "a": "\u2022 Parameters \u2014 variable names in function definition (placeholders)\n\u2022 Arguments \u2014 actual values passed when calling the function", "ex": "// 'a' and 'b' are parameters\nfunction add(a, b) { return a + b; }\n\n// 5 and 3 are arguments\nadd(5, 3); // 8\n\n// arguments object (not in arrow functions)\nfunction showArgs() {\n  console.log(arguments); // Arguments [1, 2, 3]\n}\nshowArgs(1, 2, 3);\n\n// Extra args ignored, missing = undefined\nadd(5, 3, 99); // 8 \u2014 99 ignored\n\nfunction greet(name) {\n  return \"Hello, \" + (name || \"Guest\");\n}\nconsole.log(greet());        // \"Hello, Guest\"\nconsole.log(greet(\"Alice\")); // \"Hello, Alice\""}, {"id": 19, "cat": "Functions & Scope", "q": "What is a default parameter?", "a": "Default parameters give a pre-set value when no argument (or undefined) is passed. Introduced in ES6.", "ex": "function greet(name = \"Guest\") {\n  return \"Hello, \" + name + \"!\";\n}\nconsole.log(greet());          // \"Hello, Guest!\"\nconsole.log(greet(\"Alice\"));   // \"Hello, Alice!\"\nconsole.log(greet(undefined)); // \"Hello, Guest!\"\n\n// Multiple defaults\nfunction createUser(name = \"Anonymous\", role = \"viewer\") {\n  return { name, role };\n}\nconsole.log(createUser(\"John\", \"admin\"));\n// { name: \"John\", role: \"admin\" }\n\n// Default as expression\nfunction multiply(a, b = a * 2) { return a * b; }\nconsole.log(multiply(3));    // 18\nconsole.log(multiply(3, 4)); // 12"}, {"id": 20, "cat": "Functions & Scope", "q": "How do rest parameters (...args) work?", "a": "Rest parameters collect all remaining arguments into a real Array. Work in arrow functions, unlike the 'arguments' object.", "ex": "function sum(...numbers) {\n  return numbers.reduce((total, n) => total + n, 0);\n}\nconsole.log(sum(1, 2, 3, 4, 5)); // 15\n\n// Mix with regular params\nfunction log(level, ...messages) {\n  messages.forEach(msg => console.log(\"[\" + level + \"] \" + msg));\n}\nlog(\"INFO\", \"Started\", \"Listening on 3000\");\n\n// Rest in arrow function\nconst add = (...args) => args.reduce((a, b) => a + b, 0);\n\n// Spread (opposite) \u2014 expand array into args\nconst nums = [1, 2, 3];\nconsole.log(Math.max(...nums)); // 3"}, {"id": 21, "cat": "Arrays & Objects", "q": "What is an array in JavaScript?", "a": "An ordered, zero-indexed list of values. Arrays are objects and can hold mixed types with many built-in methods.", "ex": "const fruits = [\"apple\", \"banana\", \"cherry\"];\nconsole.log(fruits[0]);     // \"apple\"\nconsole.log(fruits.length); // 3\n\n// Mixed types\nconst mixed = [1, \"hello\", true, null, [2, 3]];\n\n// Destructuring\nconst [first, second, ...rest] = fruits;\nconsole.log(first); // \"apple\"\nconsole.log(rest);  // [\"cherry\"]\n\nfruits.forEach((f, i) => console.log(i, f));\nconsole.log(Array.isArray(fruits)); // true"}, {"id": 22, "cat": "Arrays & Objects", "q": "How do you add/remove elements from an array?", "a": "\u2022 push/pop \u2014 add/remove at end\n\u2022 unshift/shift \u2014 add/remove at start\n\u2022 splice \u2014 add/remove at any position", "ex": "let arr = [2, 3, 4];\narr.push(5);          // [2,3,4,5]\narr.pop();            // [2,3,4]\narr.unshift(1);       // [1,2,3,4]\narr.shift();          // [2,3,4]\n\n// splice(start, deleteCount, ...items)\narr.splice(1, 0, 99); // insert \u2192 [2,99,3,4]\narr.splice(1, 1);     // remove \u2192 [2,3,4]\n\n// Non-mutating\nconst added   = [...arr, 5];\nconst prepend = [0, ...arr];\nconst removed = arr.filter(n => n !== 3);"}, {"id": 23, "cat": "Arrays & Objects", "q": "Difference between push(), pop(), shift(), unshift()?", "a": "\u2022 push(item) \u2014 adds to END, returns new length\n\u2022 pop() \u2014 removes from END, returns removed item\n\u2022 unshift(item) \u2014 adds to START, returns new length\n\u2022 shift() \u2014 removes from START, returns removed item", "ex": "let arr = [2, 3, 4];\n\nlet len = arr.push(5);\nconsole.log(arr, len);  // [2,3,4,5], 4\n\nlet last = arr.pop();\nconsole.log(arr, last); // [2,3,4], 5\n\narr.unshift(1);\nconsole.log(arr);       // [1,2,3,4]\n\nlet first = arr.shift();\nconsole.log(arr, first);// [2,3,4], 1\n\n// Performance:\n// push/pop   \u2192 O(1) fast\n// shift/unshift \u2192 O(n) slow (re-indexes all)"}, {"id": 24, "cat": "Arrays & Objects", "q": "What is map(), filter(), and reduce()?", "a": "\u2022 map() \u2014 transforms each element, returns same-length array\n\u2022 filter() \u2014 returns elements passing a test\n\u2022 reduce() \u2014 reduces array to a single value", "ex": "const nums = [1, 2, 3, 4, 5];\n\nconst doubled = nums.map(n => n * 2);\nconsole.log(doubled); // [2,4,6,8,10]\n\nconst evens = nums.filter(n => n % 2 === 0);\nconsole.log(evens); // [2,4]\n\nconst sum = nums.reduce((acc, n) => acc + n, 0);\nconsole.log(sum); // 15\n\n// Chaining\nconst result = nums\n  .filter(n => n % 2 === 0) // [2,4]\n  .map(n => n * 2)           // [4,8]\n  .reduce((a, b) => a + b, 0); // 12"}, {"id": 25, "cat": "Arrays & Objects", "q": "How do you remove duplicates from an array?", "a": "Use Set (stores only unique values), then spread back to array. Cleanest approach.", "ex": "const arr = [1, 2, 2, 3, 4, 4, 5];\n\n// Method 1: Set (cleanest)\nconst unique = [...new Set(arr)];\nconsole.log(unique); // [1,2,3,4,5]\n\n// Method 2: filter + indexOf\nconst unique2 = arr.filter((v, i) => arr.indexOf(v) === i);\n\n// Method 3: reduce\nconst unique3 = arr.reduce((acc, v) =>\n  acc.includes(v) ? acc : [...acc, v], []);\n\n// Objects \u2014 unique by property id\nconst users = [{ id:1, n:\"A\" }, { id:2, n:\"B\" }, { id:1, n:\"A\" }];\nconst uniqUsers = [...new Map(users.map(u => [u.id, u])).values()];"}, {"id": 26, "cat": "Arrays & Objects", "q": "How do you flatten an array?", "a": "flat(depth) flattens nested arrays. flat(Infinity) for full depth. flatMap combines map + flat.", "ex": "const nested = [1, [2, 3], [4, [5, 6]]];\n\n// flat(1) \u2014 default 1 level\nconsole.log(nested.flat());         // [1,2,3,4,[5,6]]\n\n// flat(Infinity) \u2014 full flatten\nconsole.log(nested.flat(Infinity)); // [1,2,3,4,5,6]\n\n// flatMap \u2014 map then flatten 1 level\nconst sentences = [\"Hello World\", \"Foo Bar\"];\nconst words = sentences.flatMap(s => s.split(\" \"));\nconsole.log(words); // [\"Hello\",\"World\",\"Foo\",\"Bar\"]\n\n// Manual recursive\nfunction deepFlatten(arr) {\n  return arr.reduce((flat, item) =>\n    flat.concat(Array.isArray(item) ? deepFlatten(item) : item), []);\n}"}, {"id": 27, "cat": "Arrays & Objects", "q": "What is an object in JavaScript?", "a": "A collection of key-value pairs (properties). Keys are strings/Symbols, values can be anything. Objects are reference types.", "ex": "const person = {\n  name: \"Alice\",\n  age: 30,\n  greet() { return \"Hi, I'm \" + this.name; }\n};\n\nconsole.log(person.name);    // \"Alice\"\nconsole.log(person[\"age\"]);  // 30\nconsole.log(person.greet()); // \"Hi, I'm Alice\"\n\n// Dynamic key\nconst key = \"email\";\nperson[key] = \"alice@example.com\";\n\n// Destructuring\nconst { name, age } = person;\n\n// Spread\nconst updated = { ...person, age: 31 };"}, {"id": 28, "cat": "Arrays & Objects", "q": "Dot notation vs bracket notation?", "a": "\u2022 Dot (obj.key) \u2014 clean, for known valid identifiers\n\u2022 Bracket (obj['key']) \u2014 for dynamic keys, keys with spaces, keys in variables", "ex": "const obj = { name: \"Alice\", \"first-name\": \"Alice\", age: 30 };\n\n// Dot notation\nconsole.log(obj.name);         // \"Alice\"\n\n// Bracket \u2014 required for hyphenated keys\nconsole.log(obj[\"first-name\"]); // \"Alice\"\n// obj.first-name  \u2192 SyntaxError!\n\n// Dynamic key\nconst key = \"age\";\nconsole.log(obj[key]);  // 30\n// obj.key  \u2192 undefined (looks for literal \"key\")\n\n// Computed property name\nconst prop = \"score\";\nconst player = { [prop]: 100 }; // { score: 100 }"}, {"id": 29, "cat": "Arrays & Objects", "q": "How do you merge two objects?", "a": "\u2022 Spread (...) \u2014 clean ES6 shallow merge\n\u2022 Object.assign() \u2014 mutates target\n\u2022 Deep merge \u2014 requires recursion for nested objects", "ex": "const obj1 = { a:1, b:2 };\nconst obj2 = { b:3, c:4 };\n\n// Spread (right-side wins on conflict)\nconst merged = { ...obj1, ...obj2 };\nconsole.log(merged); // { a:1, b:3, c:4 }\n\n// Object.assign\nconst result = Object.assign({}, obj1, obj2);\n\n// Shallow copies share nested references!\nconst a = { x: { y:1 } };\nconst b = { ...a };\nb.x.y = 99;\nconsole.log(a.x.y); // 99 \u2014 mutated!\n\n// Simple deep merge\nfunction deepMerge(target, source) {\n  for (const key in source) {\n    if (source[key] instanceof Object && key in target)\n      deepMerge(target[key], source[key]);\n    else target[key] = source[key];\n  }\n  return target;\n}"}, {"id": 30, "cat": "Arrays & Objects", "q": "How do you deep clone an object?", "a": "\u2022 JSON.parse(JSON.stringify()) \u2014 simple but loses functions/Dates\n\u2022 structuredClone() \u2014 modern native API\n\u2022 Recursive function \u2014 full control", "ex": "const original = { a:1, b:{ c:2 }, d:[3,4] };\n\n// Method 1: JSON (simple, loses functions)\nconst clone1 = JSON.parse(JSON.stringify(original));\nclone1.b.c = 99;\nconsole.log(original.b.c); // 2 \u2014 safe!\n\n// Method 2: structuredClone (Node 17+ / modern browsers)\nconst clone2 = structuredClone(original);\nclone2.d.push(5);\nconsole.log(original.d); // [3,4] \u2014 safe!\n\n// Method 3: recursive\nfunction deepClone(obj) {\n  if (obj === null || typeof obj !== \"object\") return obj;\n  if (Array.isArray(obj)) return obj.map(deepClone);\n  return Object.fromEntries(\n    Object.entries(obj).map(([k,v]) => [k, deepClone(v)])\n  );\n}"}, {"id": 31, "cat": "Loops & Control Flow", "q": "What is if/else and switch?", "a": "\u2022 if/else \u2014 executes based on boolean condition\n\u2022 switch \u2014 evaluates expression against multiple fixed cases (always use 'break'!)", "ex": "const score = 75;\nif (score >= 90) {\n  console.log(\"A\");\n} else if (score >= 70) {\n  console.log(\"B\"); // runs\n} else {\n  console.log(\"C\");\n}\n\nconst day = \"Monday\";\nswitch (day) {\n  case \"Saturday\":\n  case \"Sunday\":\n    console.log(\"Weekend!\");\n    break;\n  case \"Monday\":\n    console.log(\"Start of week\"); // runs\n    break;\n  default:\n    console.log(\"Weekday\");\n}"}, {"id": 32, "cat": "Loops & Control Flow", "q": "Difference between for, for...in, and for...of?", "a": "\u2022 for \u2014 index-based, best for arrays when you need index\n\u2022 for...in \u2014 iterates over object KEYS (avoid on arrays)\n\u2022 for...of \u2014 iterates over iterable VALUES (arrays, strings, Map, Set)", "ex": "const arr = [\"a\", \"b\", \"c\"];\nconst obj = { x:1, y:2 };\n\n// for \u2014 index\nfor (let i = 0; i < arr.length; i++) {\n  console.log(i, arr[i]);\n}\n\n// for...in \u2014 keys\nfor (const key in obj) {\n  console.log(key, obj[key]); // \"x\" 1, \"y\" 2\n}\n\n// for...of \u2014 values\nfor (const val of arr) {\n  console.log(val); // \"a\",\"b\",\"c\"\n}\n\n// for...of with entries (index + value)\nfor (const [i, val] of arr.entries()) {\n  console.log(i, val);\n}"}, {"id": 33, "cat": "Loops & Control Flow", "q": "What is while and do-while?", "a": "\u2022 while \u2014 checks condition BEFORE body; may run 0 times\n\u2022 do-while \u2014 runs body FIRST then checks; always runs at least once", "ex": "let count = 0;\nwhile (count < 3) {\n  console.log(count); // 0,1,2\n  count++;\n}\n\n// Never runs if condition is false from start\nwhile (false) { console.log(\"never\"); }\n\n// do-while \u2014 always runs at least once\nlet n = 5;\ndo {\n  console.log(n); // 5 \u2014 runs even though n >= 3\n  n++;\n} while (n < 3);\n\n// Useful: input validation loop\nlet input;\ndo {\n  input = prompt(\"Enter number > 0:\");\n} while (isNaN(input) || Number(input) <= 0);"}, {"id": 34, "cat": "Loops & Control Flow", "q": "What is the ternary operator?", "a": "Concise if/else for expressions. Syntax: condition ? valueIfTrue : valueIfFalse", "ex": "const age = 20;\nconst type = age >= 18 ? \"Adult\" : \"Minor\";\nconsole.log(type); // \"Adult\"\n\n// In string\nconsole.log(\"You are \" + (age >= 18 ? \"an adult\" : \"a minor\"));\n\n// Nested (use sparingly)\nconst grade = score >= 90 ? \"A\" : score >= 70 ? \"B\" : \"C\";\n\n// In React JSX\n// return <div>{isLoggedIn ? <UserPanel /> : <Login />}</div>;"}, {"id": 35, "cat": "Loops & Control Flow", "q": "What is short-circuit evaluation?", "a": "\u2022 && \u2014 returns first FALSY or last value if all truthy\n\u2022 || \u2014 returns first TRUTHY or last value if all falsy\n\u2022 ?? \u2014 returns right side only if left is null/undefined", "ex": "console.log(true && \"Hello\");  // \"Hello\"\nconsole.log(false && \"Hello\"); // false\n\nconsole.log(false || \"default\"); // \"default\"\nconsole.log(\"Alice\" || \"Guest\"); // \"Alice\"\n\n// Practical\nconst user = null;\nconst name = user && user.name; // null \u2014 no error\nconst greeting = name || \"Guest\"; // \"Guest\"\n\n// Conditional execution\nisAdmin && console.log(\"Admin panel\");\n\n// ?? nullish coalescing (ES2020)\nconst score = 0;\nconsole.log(score || \"N/A\"); // \"N/A\" \u2014 0 is falsy!\nconsole.log(score ?? \"N/A\"); // 0 \u2014 only null/undefined triggers"}, {"id": 36, "cat": "Loops & Control Flow", "q": "Difference between break and continue?", "a": "\u2022 break \u2014 exits the entire loop\n\u2022 continue \u2014 skips current iteration and moves to next", "ex": "// break \u2014 exits loop\nfor (let i = 0; i < 5; i++) {\n  if (i === 3) break;\n  console.log(i); // 0,1,2\n}\n\n// continue \u2014 skip iteration\nfor (let i = 0; i < 5; i++) {\n  if (i === 3) continue;\n  console.log(i); // 0,1,2,4 (3 skipped)\n}\n\n// Labeled break (nested loops)\nouter: for (let i = 0; i < 3; i++) {\n  for (let j = 0; j < 3; j++) {\n    if (j === 1) break outer; // exits BOTH loops\n    console.log(i, j); // 0 0 only\n  }\n}"}, {"id": 37, "cat": "Loops & Control Flow", "q": "How do you iterate over arrays and objects?", "a": "Arrays: forEach, map, for...of, for loop\nObjects: for...in, Object.keys(), Object.values(), Object.entries()", "ex": "const arr = [10, 20, 30];\nconst obj = { a:1, b:2, c:3 };\n\n// Array\narr.forEach((val, i) => console.log(i, val));\nfor (const val of arr) console.log(val);\n\n// Object\nfor (const key in obj) console.log(key, obj[key]);\nObject.keys(obj).forEach(k => console.log(k));\nObject.values(obj).forEach(v => console.log(v));\nObject.entries(obj).forEach(([k,v]) => console.log(k + \": \" + v));\n\n// Map\nconst map = new Map([[\"x\",1],[\"y\",2]]);\nfor (const [k,v] of map) console.log(k, v);"}, {"id": 38, "cat": "Loops & Control Flow", "q": "How do you implement recursion?", "a": "Function calling itself with smaller input. Needs:\n1. Base case \u2014 stopping condition\n2. Recursive case \u2014 calls itself with reduced input", "ex": "// Factorial\nfunction factorial(n) {\n  if (n <= 1) return 1;        // base case\n  return n * factorial(n - 1); // recursive case\n}\nconsole.log(factorial(5)); // 120\n\n// Fibonacci\nfunction fib(n) {\n  if (n <= 1) return n;\n  return fib(n-1) + fib(n-2);\n}\nconsole.log(fib(6)); // 8\n\n// Sum nested array\nfunction sumNested(arr) {\n  return arr.reduce((total, item) =>\n    total + (Array.isArray(item) ? sumNested(item) : item), 0);\n}\nconsole.log(sumNested([1,[2,[3,[4]]]])); // 10"}, {"id": 39, "cat": "Loops & Control Flow", "q": "When to use for vs forEach()?", "a": "\u2022 forEach \u2014 clean, readable; use when no early exit needed\n\u2022 for/for...of \u2014 use when you need break/continue", "ex": "const nums = [1,2,3,4,5];\n\n// forEach \u2014 clean\nnums.forEach(n => console.log(n));\n\n// for \u2014 can break early\nfor (let i = 0; i < nums.length; i++) {\n  if (nums[i] > 3) break;\n  console.log(nums[i]); // 1,2,3\n}\n\n// forEach cannot truly break (return only skips iteration)\nnums.forEach(n => {\n  if (n > 3) return; // skips current, doesn't stop\n  console.log(n);\n});\n\n// for...of \u2014 clean + can break\nfor (const n of nums) {\n  if (n > 3) break;\n  console.log(n); // 1,2,3\n}"}, {"id": 40, "cat": "Loops & Control Flow", "q": "How do you handle early exits from loops?", "a": "\u2022 break \u2014 exits the loop\n\u2022 return \u2014 exits the function\n\u2022 some() \u2014 stops when callback returns true\n\u2022 every() \u2014 stops when callback returns false", "ex": "const arr = [1,2,3,4,5];\n\n// break\nfor (const item of arr) {\n  if (item === 3) break;\n  console.log(item); // 1,2\n}\n\n// return from function\nfunction findFirst(arr, val) {\n  for (const item of arr) {\n    if (item === val) return item; // exits function\n  }\n  return null;\n}\n\n// some() \u2014 stops at first true\narr.some(n => { console.log(n); return n === 3; }); // logs 1,2,3\n\n// every() \u2014 stops at first false\narr.every(n => { console.log(n); return n < 3; }); // logs 1,2,3"}, {"id": 41, "cat": "DOM & Events", "q": "What is the DOM?", "a": "The DOM (Document Object Model) is a programming interface for HTML. It represents the page as a tree of nodes, letting JS read, manipulate, and update structure/style/content dynamically.", "ex": "// DOM tree structure:\n// document\n//   \u2514\u2500 body\n//       \u2514\u2500 div#app\n//           \u251c\u2500 h1\n//           \u2514\u2500 p.text\n\nconst app = document.getElementById(\"app\");\nconsole.log(app.children);      // HTMLCollection [h1, p]\nconsole.log(app.parentElement); // body\n\n// Modify content\napp.innerHTML = \"<p>New content</p>\";\ndocument.title = \"My Page\";"}, {"id": 42, "cat": "DOM & Events", "q": "How do you select elements?", "a": "\u2022 getElementById \u2014 single element by ID (fastest)\n\u2022 getElementsByClassName/TagName \u2014 live HTMLCollection\n\u2022 querySelector \u2014 first match via CSS selector\n\u2022 querySelectorAll \u2014 all matches (static NodeList) \u2014 recommended", "ex": "const header  = document.getElementById(\"header\");\nconst cards   = document.getElementsByClassName(\"card\");\nconst paras   = document.getElementsByTagName(\"p\");\n\n// querySelector \u2014 recommended\nconst btn     = document.querySelector(\"#submit-btn\");\nconst first   = document.querySelector(\".card\");\nconst navLink = document.querySelector(\"nav a\");\n\n// querySelectorAll \u2014 all matches\nconst allCards = document.querySelectorAll(\".card\");\nallCards.forEach(c => console.log(c.textContent));\n\n// Complex selectors\nconst active = document.querySelector(\"li.active > a\");\nconst inputs = document.querySelectorAll(\"input[type='text']\");"}, {"id": 43, "cat": "DOM & Events", "q": "How do you change element text or HTML?", "a": "\u2022 textContent \u2014 plain text, safe (no HTML parsing)\n\u2022 innerHTML \u2014 parses HTML (XSS risk with user input!)\n\u2022 style/classList \u2014 change styles and classes", "ex": "const el = document.querySelector(\"#message\");\n\n// textContent \u2014 safe, no HTML parsing\nel.textContent = \"Hello <b>World</b>\";\n// Renders: Hello <b>World</b> (literal text)\n\n// innerHTML \u2014 parses HTML\nel.innerHTML = \"Hello <b>World</b>\";\n// Renders: Hello World (bold)\n// WARNING: never use innerHTML with user input (XSS!)\n\n// Attributes\nel.setAttribute(\"class\", \"highlight\");\n\n// Styles\nel.style.color = \"red\";\nel.style.fontSize = \"24px\";\n\n// Classes\nel.classList.add(\"active\");\nel.classList.remove(\"hidden\");\nel.classList.toggle(\"dark\");"}, {"id": 44, "cat": "DOM & Events", "q": "How do you add/remove/replace DOM elements?", "a": "Create with createElement, add with append/appendChild, remove with remove(), replace with replaceWith().", "ex": "const newDiv = document.createElement(\"div\");\nnewDiv.textContent = \"New element\";\nnewDiv.className = \"card\";\n\nconst container = document.getElementById(\"container\");\n\n// Add\ncontainer.appendChild(newDiv);       // at end\ncontainer.prepend(newDiv);           // at start\ncontainer.insertBefore(newDiv, ref); // before ref\n\n// Remove\nnewDiv.remove();                     // modern\ncontainer.removeChild(newDiv);       // older\n\n// Replace\nconst old = document.getElementById(\"old\");\nold.replaceWith(newDiv);\n\n// Clone\nconst clone = newDiv.cloneNode(true); // deep clone\ncontainer.append(clone);"}, {"id": 45, "cat": "DOM & Events", "q": "How do you listen to events?", "a": "Use addEventListener(event, handler). Supports multiple listeners and is removable. Avoid inline event handlers.", "ex": "const btn   = document.getElementById(\"btn\");\nconst input = document.getElementById(\"input\");\n\nbtn.addEventListener(\"click\", (e) => {\n  console.log(\"Clicked!\", e.target);\n});\n\ninput.addEventListener(\"keyup\", (e) => {\n  console.log(\"Key:\", e.key, \"Value:\", e.target.value);\n});\n\ndocument.addEventListener(\"keydown\", (e) => {\n  if (e.ctrlKey && e.key === \"s\") {\n    e.preventDefault();\n    console.log(\"Ctrl+S pressed\");\n  }\n});\n\nwindow.addEventListener(\"resize\", () => console.log(\"Resized\"));\ndocument.addEventListener(\"DOMContentLoaded\", () => console.log(\"Ready\"));"}, {"id": 46, "cat": "DOM & Events", "q": "What is event delegation?", "a": "Attaches ONE listener to a parent instead of many on each child. Leverages event bubbling. Works for dynamically added elements.", "ex": "// Bad: listener on each item (new items won't have listeners)\ndocument.querySelectorAll(\"li\").forEach(li => {\n  li.addEventListener(\"click\", handler);\n});\n\n// Good: one listener on parent\nconst ul = document.getElementById(\"todo-list\");\nul.addEventListener(\"click\", (e) => {\n  if (e.target.tagName === \"LI\") {\n    e.target.classList.toggle(\"done\");\n  }\n  if (e.target.classList.contains(\"delete-btn\")) {\n    e.target.closest(\"li\").remove();\n  }\n});\n\n// Dynamically added items also work!\nul.innerHTML += '<li>New Item <button class=\"delete-btn\">x</button></li>';"}, {"id": 47, "cat": "DOM & Events", "q": "Event bubbling vs capturing?", "a": "3 phases:\n1. Capture \u2014 window down to target\n2. Target \u2014 at the element\n3. Bubble \u2014 target up to window (default)\nUse { capture: true } for capture phase.", "ex": "// Bubble (default)\ndocument.getElementById(\"parent\").addEventListener(\"click\", () => {\n  console.log(\"Parent\"); // fires 2nd\n});\ndocument.getElementById(\"child\").addEventListener(\"click\", () => {\n  console.log(\"Child\");  // fires 1st\n});\n\n// Capture \u2014 fires top-down (true flag)\ndocument.getElementById(\"parent\").addEventListener(\"click\", () => {\n  console.log(\"Capture\"); // fires first of all\n}, true);\n\n// Stop bubbling\ndocument.getElementById(\"child\").addEventListener(\"click\", (e) => {\n  e.stopPropagation(); // parent never fires\n  console.log(\"Only child\");\n});"}, {"id": 48, "cat": "DOM & Events", "q": "event.target vs event.currentTarget?", "a": "\u2022 event.target \u2014 element that triggered the event (where click happened)\n\u2022 event.currentTarget \u2014 element the listener is attached to (same as 'this')", "ex": "// HTML: <ul id=\"list\"><li>Item 1</li></ul>\nconst ul = document.getElementById(\"list\");\nul.addEventListener(\"click\", function(e) {\n  console.log(\"target:\", e.target);\n  // => <li>Item 1</li>  \u2014 where click happened\n\n  console.log(\"currentTarget:\", e.currentTarget);\n  // => <ul id=\"list\">   \u2014 where listener is attached\n});\n\n// Event delegation use case\nul.addEventListener(\"click\", (e) => {\n  const li = e.target.closest(\"li\");\n  if (li) console.log(\"Clicked:\", li.textContent);\n  // e.currentTarget is always the ul\n});"}, {"id": 49, "cat": "DOM & Events", "q": "How do you prevent default behavior?", "a": "event.preventDefault() stops the browser's default action (link navigation, form submission, etc.). Does NOT stop bubbling.", "ex": "// Prevent link navigation\ndocument.querySelector(\"a\").addEventListener(\"click\", (e) => {\n  e.preventDefault();\n  console.log(\"Link not followed\");\n});\n\n// Prevent form submission\ndocument.querySelector(\"form\").addEventListener(\"submit\", (e) => {\n  e.preventDefault();\n  const data = new FormData(e.target);\n  fetch(\"/api/submit\", { method: \"POST\", body: data });\n});\n\n// Prevent right-click context menu\ndocument.addEventListener(\"contextmenu\", (e) => {\n  e.preventDefault();\n  showCustomMenu(e.clientX, e.clientY);\n});"}, {"id": 50, "cat": "DOM & Events", "q": "How do you remove an event listener?", "a": "Use removeEventListener(event, handler). Must use the SAME function reference. Anonymous functions CANNOT be removed.", "ex": "// Store function reference \u2014 can remove\nfunction handleClick() { console.log(\"Clicked\"); }\nbtn.addEventListener(\"click\", handleClick);\nbtn.removeEventListener(\"click\", handleClick); // removed!\n\n// Anonymous \u2014 cannot remove (no reference!)\nbtn.addEventListener(\"click\", () => console.log(\"click\"));\n\n// Self-removing listener\nbtn.addEventListener(\"click\", function once() {\n  console.log(\"Only fires once!\");\n  btn.removeEventListener(\"click\", once);\n});\n\n// Modern: { once: true } \u2014 auto-removes after first trigger\nbtn.addEventListener(\"click\", handler, { once: true });\n\n// AbortController\nconst ctrl = new AbortController();\nbtn.addEventListener(\"click\", handler, { signal: ctrl.signal });\nctrl.abort(); // removes the listener"}, {"id": 51, "cat": "Async JS", "q": "What is the call stack and callback queue?", "a": "\u2022 Call Stack \u2014 LIFO structure tracking function execution\n\u2022 Callback Queue \u2014 where async callbacks wait until call stack is empty", "ex": "function third()  { console.log(\"third\"); }\nfunction second() { third(); console.log(\"second\"); }\nfunction first()  { second(); console.log(\"first\"); }\n\nfirst(); // Output: third, second, first\n// Stack: first \u2192 second \u2192 third, then unwinds\n\n// Async example\nconsole.log(\"A\");\nsetTimeout(() => console.log(\"B\"), 0); // goes to queue\nconsole.log(\"C\");\n\n// Output: A, C, B\n// 0ms timeout still waits for stack to clear!"}, {"id": 52, "cat": "Async JS", "q": "What is the event loop?", "a": "The event loop moves callbacks from the queue to the call stack when the stack is empty. Gives JS async capability despite being single-threaded.", "ex": "console.log(\"1 - Sync\");\nsetTimeout(() => console.log(\"2 - MacroTask\"), 0);\nPromise.resolve().then(() => console.log(\"3 - MicroTask\"));\nconsole.log(\"4 - Sync\");\n\n// Output order: 1, 4, 3, 2\n// Order: Sync \u2192 MicroTasks (Promises) \u2192 MacroTasks (setTimeout)\n\n// MicroTasks: Promise.then, queueMicrotask, MutationObserver\n// MacroTasks: setTimeout, setInterval, I/O events"}, {"id": 53, "cat": "Async JS", "q": "What is asynchronous programming?", "a": "Allows JS to perform long operations (network, I/O, timers) without blocking the main thread. Results handled later via callbacks, Promises, or async/await.", "ex": "// Sync \u2014 blocks execution!\nconst data = readFileSync(\"file.txt\"); // blocks!\n\n// Async \u2014 non-blocking\nsetTimeout(() => console.log(\"Done\"), 1000);\nconsole.log(\"Runs immediately\"); // doesn't wait!\n\n// Promise\nfetch(\"/api/data\")\n  .then(r => r.json())\n  .then(d => console.log(d))\n  .catch(console.error);\n\n// async/await (modern, cleanest)\nasync function getData() {\n  try {\n    const res = await fetch(\"/api/data\");\n    const data = await res.json();\n    console.log(data);\n  } catch (err) { console.error(err); }\n}"}, {"id": 54, "cat": "Async JS", "q": "What is a callback function?", "a": "A function passed as argument to another function, to be executed later. The original way to handle async in JS.", "ex": "// Sync callback\nfunction greet(name, callback) {\n  callback(\"Hello, \" + name);\n}\ngreet(\"Alice\", msg => console.log(msg)); // \"Hello, Alice\"\n\n// Async callback\nfunction fetchUser(id, callback) {\n  setTimeout(() => {\n    const user = { id, name: \"User \" + id };\n    callback(null, user); // Node.js convention: (err, data)\n  }, 1000);\n}\n\nfetchUser(1, (err, user) => {\n  if (err) return console.error(err);\n  console.log(user); // { id:1, name:\"User 1\" }\n});\n\n// Built-in callbacks\n[1,2,3].forEach(n => console.log(n));\ndocument.addEventListener(\"click\", handler);"}, {"id": 55, "cat": "Async JS", "q": "What is callback hell?", "a": "Deeply nested callbacks making code hard to read and maintain (Pyramid of Doom). Solved by Promises or async/await.", "ex": "// Callback Hell \u2014 hard to read!\ngetUser(1, (err, user) => {\n  getOrders(user.id, (err, orders) => {\n    getDetails(orders[0].id, (err, details) => {\n      getShipping(details.id, (err, ship) => {\n        console.log(ship); // finally!\n      });\n    });\n  });\n});\n\n// Promises \u2014 flat chaining\ngetUser(1)\n  .then(u => getOrders(u.id))\n  .then(o => getDetails(o[0].id))\n  .then(d => getShipping(d.id))\n  .then(s => console.log(s))\n  .catch(handleError);\n\n// async/await \u2014 reads like sync code!\nasync function run() {\n  const user    = await getUser(1);\n  const orders  = await getOrders(user.id);\n  const details = await getDetails(orders[0].id);\n  return await getShipping(details.id);\n}"}, {"id": 56, "cat": "Async JS", "q": "What is a Promise?", "a": "Represents a future value. 3 states:\n\u2022 pending \u2014 initial\n\u2022 fulfilled \u2014 success\n\u2022 rejected \u2014 failed", "ex": "const myPromise = new Promise((resolve, reject) => {\n  setTimeout(() => {\n    const success = true;\n    if (success) resolve(\"Data loaded!\");\n    else reject(new Error(\"Failed!\"));\n  }, 1000);\n});\n\nmyPromise\n  .then(data => console.log(data))    // \"Data loaded!\"\n  .catch(err => console.error(err))\n  .finally(() => console.log(\"Done\")); // always runs\n\n// Wrap callback API as Promise\nfunction readFile(path) {\n  return new Promise((resolve, reject) => {\n    fs.readFile(path, (err, data) => {\n      err ? reject(err) : resolve(data);\n    });\n  });\n}"}, {"id": 57, "cat": "Async JS", "q": "What is .then() and .catch()?", "a": "\u2022 .then() \u2014 handles fulfilled state, returns new Promise (enables chaining)\n\u2022 .catch() \u2014 handles rejected state\n\u2022 .finally() \u2014 always runs", "ex": "fetch(\"/api/users/1\")\n  .then(res => {\n    if (!res.ok) throw new Error(\"HTTP \" + res.status);\n    return res.json(); // returns another Promise\n  })\n  .then(user => {\n    console.log(user.name);\n    return user.id;\n  })\n  .then(id => console.log(\"ID:\", id))\n  .catch(err => console.error(\"Error:\", err.message))\n  .finally(() => hideSpinner());\n\n// Chaining transforms value\nPromise.resolve(2)\n  .then(n => n * 3)   // 6\n  .then(n => n + 4)   // 10\n  .then(console.log); // 10"}, {"id": 58, "cat": "Async JS", "q": "What is Promise.all() and Promise.race()?", "a": "\u2022 Promise.all() \u2014 all must resolve; rejects if any rejects\n\u2022 Promise.race() \u2014 first to settle wins\n\u2022 Promise.allSettled() \u2014 waits for all, gets all results\n\u2022 Promise.any() \u2014 resolves when first resolves", "ex": "const p1 = fetch(\"/api/user\");\nconst p2 = fetch(\"/api/posts\");\nconst p3 = fetch(\"/api/comments\");\n\n// all \u2014 all must succeed\nPromise.all([p1, p2, p3])\n  .then(([user, posts, comments]) => console.log(\"All done!\"))\n  .catch(err => console.error(\"One failed:\", err));\n\n// race \u2014 first wins (great for timeouts)\nconst timeout = new Promise((_, rej) =>\n  setTimeout(() => rej(new Error(\"Timeout!\")), 5000)\n);\nPromise.race([fetch(\"/api/data\"), timeout])\n  .then(data => console.log(\"Got data!\"))\n  .catch(err => console.error(err));\n\n// allSettled \u2014 all results regardless\nPromise.allSettled([p1, p2]).then(results =>\n  results.forEach(r => console.log(r.status)));"}, {"id": 59, "cat": "Async JS", "q": "What is async/await?", "a": "Syntactic sugar over Promises. Makes async code look synchronous. 'async' marks a function asynchronous; 'await' pauses until a Promise resolves.", "ex": "// Promise chain\nfunction getUser() {\n  return fetch(\"/api/user\").then(r => r.json());\n}\n\n// async/await \u2014 much cleaner!\nasync function getUser() {\n  const response = await fetch(\"/api/user\"); // pauses here\n  const user = await response.json();\n  return user; // async functions always return a Promise\n}\n\n// Usage\ngetUser().then(user => console.log(user));\n\n// Parallel with Promise.all\nasync function loadAll() {\n  const [user, posts] = await Promise.all([\n    fetch(\"/api/user\").then(r => r.json()),\n    fetch(\"/api/posts\").then(r => r.json()),\n  ]);\n  console.log(user, posts);\n}"}, {"id": 60, "cat": "Async JS", "q": "How do you handle errors in async/await?", "a": "Use try/catch blocks around await calls. Or .catch() on the returned Promise. Helper wrapper avoids repetitive try/catch.", "ex": "// try/catch \u2014 most common\nasync function fetchData(url) {\n  try {\n    const res = await fetch(url);\n    if (!res.ok) throw new Error(\"HTTP \" + res.status);\n    return await res.json();\n  } catch (err) {\n    console.error(\"Error:\", err.message);\n    return null;\n  } finally {\n    console.log(\"Done\");\n  }\n}\n\n// .catch() on the call\nconst data = await fetchData(\"/api\").catch(console.error);\n\n// Helper: avoid-try-catch wrapper\nasync function to(promise) {\n  try { return [null, await promise]; }\n  catch (err) { return [err, null]; }\n}\nconst [err, user] = await to(fetchUser(1));\nif (err) console.error(err);\nelse console.log(user);"}, {"id": 61, "cat": "OOP & ES6+", "q": "What is OOP in JavaScript?", "a": "OOP organizes code around objects with data (properties) and behavior (methods). 4 pillars: Encapsulation, Inheritance, Polymorphism, Abstraction.", "ex": "class Animal {\n  constructor(name, sound) {\n    this.name = name;\n    this.sound = sound;\n  }\n  speak() { return this.name + \" says \" + this.sound; }\n}\n\nclass Dog extends Animal {\n  constructor(name) { super(name, \"Woof\"); }\n  fetch() { return this.name + \" fetches the ball!\"; }\n}\n\nconst dog = new Dog(\"Rex\");\nconsole.log(dog.speak());          // \"Rex says Woof\"\nconsole.log(dog.fetch());          // \"Rex fetches the ball!\"\nconsole.log(dog instanceof Animal); // true"}, {"id": 62, "cat": "OOP & ES6+", "q": "What is a constructor function?", "a": "Creates objects before ES6 classes. Called with 'new', creates a new object and assigns 'this' to it. Methods added to .prototype are shared across instances.", "ex": "function Person(name, age) {\n  this.name = name;\n  this.age  = age;\n}\n\n// Methods on prototype \u2014 shared by all instances\nPerson.prototype.greet = function() {\n  return \"Hi, I'm \" + this.name;\n};\n\nconst alice = new Person(\"Alice\", 30);\nconst bob   = new Person(\"Bob\",   25);\n\nconsole.log(alice.greet()); // \"Hi, I'm Alice\"\nconsole.log(alice instanceof Person); // true\n\n// ES6 class is syntactic sugar for this"}, {"id": 63, "cat": "OOP & ES6+", "q": "What is prototypal inheritance?", "a": "Every JS object has a [[Prototype]] link. When accessing a property, JS walks up the chain until found or null is reached.", "ex": "const animal = {\n  breathe() { return this.name + \" breathes\"; }\n};\n\nconst dog = Object.create(animal); // dog inherits from animal\ndog.name = \"Rex\";\ndog.bark = function() { return \"Woof!\"; };\n\nconsole.log(dog.breathe()); // \"Rex breathes\" \u2014 from prototype\nconsole.log(dog.bark());    // \"Woof!\" \u2014 own method\nconsole.log(dog.hasOwnProperty(\"name\"));    // true\nconsole.log(dog.hasOwnProperty(\"breathe\")); // false\n\n// Chain: dog \u2192 animal \u2192 Object.prototype \u2192 null\nconsole.log(Object.getPrototypeOf(dog) === animal); // true"}, {"id": 64, "cat": "OOP & ES6+", "q": "What is a class in ES6?", "a": "Syntactic sugar over prototypes. Features: constructor, methods, extends, super, static, getters/setters, private fields (#).", "ex": "class Rectangle {\n  #width; #height; // private fields (ES2022)\n\n  constructor(w, h) { this.#width = w; this.#height = h; }\n\n  area() { return this.#width * this.#height; }\n\n  get dimensions() { return this.#width + \"x\" + this.#height; }\n\n  static compare(r1, r2) { return r1.area() - r2.area(); }\n}\n\nconst rect = new Rectangle(5, 3);\nconsole.log(rect.area());         // 15\nconsole.log(rect.dimensions);     // \"5x3\"\nconsole.log(Rectangle.compare(new Rectangle(4,4), rect)); // 1\n// rect.#width \u2192 SyntaxError \u2014 private!"}, {"id": 65, "cat": "OOP & ES6+", "q": "What is the 'this' keyword?", "a": "Refers to the object calling the method. Value depends on HOW the function is called:\n\u2022 Method call \u2014 owning object\n\u2022 Regular function \u2014 global/undefined (strict mode)\n\u2022 Arrow function \u2014 lexical (outer scope)\n\u2022 call/apply/bind \u2014 explicitly set", "ex": "const user = {\n  name: \"Alice\",\n  greet() { return \"Hi, I'm \" + this.name; }\n};\nconsole.log(user.greet()); // \"Hi, I'm Alice\"\n\n// Problem: losing 'this' in callback\nconst obj = {\n  name: \"Bob\",\n  delay() {\n    setTimeout(function() {\n      console.log(this.name); // undefined! (global scope)\n    }, 100);\n  }\n};\n\n// Fix: arrow function (inherits 'this')\nconst obj2 = {\n  name: \"Bob\",\n  delay() {\n    setTimeout(() => {\n      console.log(this.name); // \"Bob\" \u2014 lexical this\n    }, 100);\n  }\n};"}, {"id": 66, "cat": "OOP & ES6+", "q": "Static vs instance methods?", "a": "\u2022 Instance methods \u2014 called on instances, have 'this', defined on prototype\n\u2022 Static methods \u2014 called on CLASS, no instance 'this', utility functions", "ex": "class MathHelper {\n  constructor(value) { this.value = value; }\n\n  // Instance method \u2014 called on instance\n  double() { return this.value * 2; }\n\n  // Static method \u2014 called on class\n  static add(a, b) { return a + b; }\n  static isPrime(n) {\n    for (let i = 2; i <= Math.sqrt(n); i++)\n      if (n % i === 0) return false;\n    return n > 1;\n  }\n}\n\nconst h = new MathHelper(5);\nconsole.log(h.double());             // 10\nconsole.log(MathHelper.add(3, 4));   // 7\nconsole.log(MathHelper.isPrime(7));  // true\n// h.add() \u2192 TypeError (static not on instance)"}, {"id": 67, "cat": "OOP & ES6+", "q": "What is inheritance and method overriding?", "a": "Inheritance: child class extends parent, gains its properties/methods.\nOverriding: child redefines a parent method. Use super.method() to call parent.", "ex": "class Shape {\n  constructor(color) { this.color = color; }\n  area() { return 0; }\n  toString() { return this.color + \" area=\" + this.area(); }\n}\n\nclass Circle extends Shape {\n  constructor(color, r) {\n    super(color); // must call super first!\n    this.r = r;\n  }\n  area() { return Math.PI * this.r * this.r; } // override\n}\n\nclass Square extends Shape {\n  constructor(color, s) { super(color); this.s = s; }\n  area() { return this.s * this.s; }\n}\n\nconst c = new Circle(\"red\", 5);\nconsole.log(c.area());      // 78.53...\nconsole.log(c.toString());  // \"red area=78.53...\"\nconsole.log(c instanceof Shape); // true"}, {"id": 68, "cat": "OOP & ES6+", "q": "What is encapsulation and private fields?", "a": "Encapsulation bundles data + methods and restricts direct access. Private fields (#) are truly private \u2014 inaccessible outside the class.", "ex": "class BankAccount {\n  #balance;\n  #owner;\n\n  constructor(owner, balance) {\n    this.#owner   = owner;\n    this.#balance = balance;\n  }\n\n  deposit(amt) {\n    if (amt <= 0) throw new Error(\"Positive amounts only\");\n    this.#balance += amt;\n  }\n\n  withdraw(amt) {\n    if (amt > this.#balance) throw new Error(\"Insufficient funds\");\n    this.#balance -= amt;\n  }\n\n  get balance() { return this.#balance; } // public getter\n}\n\nconst acc = new BankAccount(\"Alice\", 1000);\nacc.deposit(500);\nconsole.log(acc.balance); // 1500\n// acc.#balance \u2192 SyntaxError (truly private!)"}, {"id": 69, "cat": "OOP & ES6+", "q": "What is a module (ES6 modules)?", "a": "Modules split code into separate files with clear imports/exports. Each module has its own scope. Supported natively in modern browsers and Node.js.", "ex": "// math.js \u2014 named exports\nexport const PI = 3.14159;\nexport function add(a, b) { return a + b; }\nexport default function subtract(a, b) { return a - b; }\n\n// main.js \u2014 importing\nimport subtract from \"./math.js\";           // default import\nimport { add, PI } from \"./math.js\";         // named imports\nimport { add as sum } from \"./math.js\";      // renamed\nimport * as math from \"./math.js\";           // namespace\n\nconsole.log(PI);             // 3.14159\nconsole.log(add(2, 3));      // 5\nconsole.log(subtract(5, 2)); // 3"}, {"id": 70, "cat": "OOP & ES6+", "q": "Difference between import and export?", "a": "\u2022 export \u2014 makes values available to other modules\n\u2022 import \u2014 brings in exported values\nNamed exports (multiple per module) vs default export (one per module).", "ex": "// Named exports (multiple allowed)\nexport const name = \"Alice\";\nexport function greet() {}\nexport class User {}\n\n// Default export (only one per module)\nexport default function main() {}\n\n// Re-export from another module\nexport { name } from \"./utils.js\";\nexport * from \"./helpers.js\";\n\n// Importing\nimport main from \"./mod.js\";              // default\nimport { name, greet } from \"./mod.js\";   // named\nimport { name as n } from \"./mod.js\";     // renamed\n\n// Dynamic import (lazy loading)\nconst mod = await import(\"./heavy.js\");\nmod.doSomething();"}, {"id": 71, "cat": "Error & Performance", "q": "What are try/catch/finally?", "a": "\u2022 try \u2014 code to attempt; error thrown \u2192 jumps to catch\n\u2022 catch(err) \u2014 handles the error, receives Error object\n\u2022 finally \u2014 always runs (success or failure)", "ex": "function divide(a, b) {\n  try {\n    if (b === 0) throw new Error(\"Division by zero\");\n    return a / b;\n  } catch (err) {\n    console.error(\"Caught:\", err.message);\n    return null;\n  } finally {\n    console.log(\"divide() complete\"); // always!\n  }\n}\n\nconsole.log(divide(10, 2)); // 5\nconsole.log(divide(10, 0)); // null\n\n// Re-throw unknown errors\ntry {\n  doSomething();\n} catch (err) {\n  if (err instanceof TypeError) throw err; // re-throw\n  console.error(\"Handled:\", err.message);\n}"}, {"id": 72, "cat": "Error & Performance", "q": "What is the Error object?", "a": "Error has: name, message, stack properties.\nBuilt-in types: Error, TypeError, RangeError, ReferenceError, SyntaxError", "ex": "try {\n  null.property; // TypeError\n} catch (err) {\n  console.log(err.name);    // \"TypeError\"\n  console.log(err.message); // \"Cannot read properties of null\"\n  console.log(err.stack);   // full call stack trace\n}\n\n// Built-in error types:\n// null.foo          \u2192 TypeError\n// unknownVar        \u2192 ReferenceError\n// new Array(-1)     \u2192 RangeError\n// JSON.parse(\"!\")   \u2192 SyntaxError\n\nconst err = new Error(\"Something went wrong\");\nconst typeErr = new TypeError(\"Expected a string\");\nconsole.log(typeErr instanceof Error); // true"}, {"id": 73, "cat": "Error & Performance", "q": "How do you create custom errors?", "a": "Extend the Error class to create custom types with extra properties for better error differentiation in catch blocks.", "ex": "class ValidationError extends Error {\n  constructor(message, field) {\n    super(message);\n    this.name  = \"ValidationError\";\n    this.field = field;\n  }\n}\n\nclass NetworkError extends Error {\n  constructor(message, status) {\n    super(message);\n    this.name   = \"NetworkError\";\n    this.status = status;\n  }\n}\n\nfunction validateAge(age) {\n  if (typeof age !== \"number\")\n    throw new ValidationError(\"Age must be a number\", \"age\");\n  if (age < 0 || age > 120)\n    throw new ValidationError(\"Age out of range\", \"age\");\n}\n\ntry {\n  validateAge(-5);\n} catch (err) {\n  if (err instanceof ValidationError)\n    console.log(\"Field '\" + err.field + \"': \" + err.message);\n  else throw err; // re-throw unknown\n}"}, {"id": 74, "cat": "Error & Performance", "q": "What are useful console methods?", "a": "Beyond console.log: warn, error, table (arrays/objects), group/groupEnd (nesting), time/timeEnd (perf), assert (conditional).", "ex": "console.log(\"Basic log\");\nconsole.warn(\"Warning!\");\nconsole.error(\"Error!\");\n\n// table \u2014 great for arrays of objects\nconst users = [{ id:1, name:\"Alice\" }, { id:2, name:\"Bob\" }];\nconsole.table(users); // renders as a table!\n\n// group \u2014 nest related logs\nconsole.group(\"User Details\");\n  console.log(\"Name: Alice\");\n  console.log(\"Age: 30\");\nconsole.groupEnd();\n\n// time \u2014 measure performance\nconsole.time(\"loop\");\nfor (let i = 0; i < 1e6; i++) {}\nconsole.timeEnd(\"loop\"); // \"loop: 2.3ms\"\n\n// assert \u2014 logs if condition is false\nconsole.assert(2 + 2 === 5, \"Math broken!\"); // logged!\nconsole.count(\"clicked\"); // \"clicked: 1\""}, {"id": 75, "cat": "Error & Performance", "q": "How do you use breakpoints and debugger?", "a": "Breakpoints pause execution for inspection. Use DevTools Sources panel (click line number) or the 'debugger' statement in code.", "ex": "function calculateTotal(items) {\n  debugger; // pauses execution here when DevTools is open\n  return items.reduce((sum, i) => sum + i.price, 0);\n}\n\n// DevTools tips:\n// Sources tab \u2192 click line number \u2192 set breakpoint\n// Step Over (F10), Step Into (F11), Step Out (Shift+F11)\n// Right-click \u2192 \"Add conditional breakpoint\" (e.g. i > 100)\n// Right-click \u2192 \"Add logpoint\" (log without code change)\n\n// Console debugging\nfunction debugFn(arr) {\n  console.log(\"Input:\", arr);\n  const result = arr.map(x => {\n    console.log(\"Processing:\", x);\n    return x * 2;\n  });\n  console.log(\"Output:\", result);\n  return result;\n}"}, {"id": 76, "cat": "Error & Performance", "q": "What is performance profiling?", "a": "DevTools Performance panel records CPU, call stack, paint events. Use Performance API for code-level measurement.", "ex": "// Performance API \u2014 precise timing\nconst t0 = performance.now();\nexpensiveFunction();\nconst t1 = performance.now();\nconsole.log(\"Took \" + (t1 - t0).toFixed(2) + \"ms\");\n\n// Mark and Measure\nperformance.mark(\"startOp\");\ndoWork();\nperformance.mark(\"endOp\");\nperformance.measure(\"myOp\", \"startOp\", \"endOp\");\nconst [m] = performance.getEntriesByName(\"myOp\");\nconsole.log(m.duration + \"ms\");\n\n// console.time shortcut\nconsole.time(\"render\");\nrenderComponent();\nconsole.timeEnd(\"render\");\n\n// DevTools: Performance \u2192 Record \u2192 Interact \u2192 Stop\n// Look for: Long Tasks (>50ms), expensive call stacks"}, {"id": 77, "cat": "Error & Performance", "q": "How do you avoid blocking the main thread?", "a": "Break heavy work into chunks, use Web Workers for CPU tasks, async/await for I/O, requestAnimationFrame for animations.", "ex": "// Blocking \u2014 freezes the UI!\nfunction heavy() { for (let i = 0; i < 1e9; i++) {} }\n\n// Chunked with setTimeout \u2014 yields to UI between chunks\nfunction heavyAsync(done) {\n  let i = 0;\n  function chunk() {\n    const end = Math.min(i + 1e6, 1e9);\n    for (; i < end; i++) {}\n    if (i < 1e9) setTimeout(chunk, 0); // yield control\n    else done();\n  }\n  chunk();\n}\n\n// Web Worker \u2014 true separate thread\nconst worker = new Worker(\"worker.js\");\nworker.postMessage({ data: bigArray });\nworker.onmessage = e => console.log(\"Result:\", e.data);\n// In worker.js: self.onmessage = e => self.postMessage(process(e.data));\n\n// Animations \u2014 sync to display refresh rate\nfunction animate() {\n  updateFrame();\n  requestAnimationFrame(animate); // 60fps\n}"}, {"id": 78, "cat": "Error & Performance", "q": "What is debouncing vs throttling?", "a": "\u2022 Debounce \u2014 delays until N ms after LAST call; use for: search input, resize\n\u2022 Throttle \u2014 max once every N ms; use for: scroll, mousemove", "ex": "// Debounce\nfunction debounce(fn, delay) {\n  let timer;\n  return function(...args) {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn.apply(this, args), delay);\n  };\n}\nconst search = debounce(q => fetch(\"/api?q=\" + q), 300);\ninput.addEventListener(\"input\", e => search(e.target.value));\n// Fires 300ms AFTER user stops typing\n\n// Throttle\nfunction throttle(fn, limit) {\n  let inThrottle;\n  return function(...args) {\n    if (!inThrottle) {\n      fn.apply(this, args);\n      inThrottle = true;\n      setTimeout(() => inThrottle = false, limit);\n    }\n  };\n}\nwindow.addEventListener(\"scroll\", throttle(updateBar, 100));\n// Fires at most once every 100ms"}, {"id": 79, "cat": "Error & Performance", "q": "How do you optimize heavy loops and renders?", "a": "Cache array length, batch DOM updates, use DocumentFragment, requestAnimationFrame for animations, memoize repeated calculations.", "ex": "// Cache length\nfor (let i = 0, len = arr.length; i < len; i++) {}\n\n// Bad: DOM update inside loop (repaints each time!)\nitems.forEach(item => {\n  list.innerHTML += \"<li>\" + item + \"</li>\";\n});\n\n// Good: build string, update DOM once\nlist.innerHTML = items.map(i => \"<li>\" + i + \"</li>\").join(\"\");\n\n// Best: DocumentFragment \u2014 single DOM update\nconst frag = document.createDocumentFragment();\nitems.forEach(item => {\n  const li = document.createElement(\"li\");\n  li.textContent = item;\n  frag.appendChild(li);\n});\nlist.appendChild(frag);\n\n// Animations \u2014 sync to 60fps\nfunction animate() {\n  updateFrame();\n  requestAnimationFrame(animate);\n}"}, {"id": 80, "cat": "Error & Performance", "q": "How do you handle memory leaks?", "a": "Common causes: forgotten event listeners, uncleaned intervals, closures holding large data, detached DOM nodes. Always clean up.", "ex": "// Leak: listener never removed\nbtn.addEventListener(\"click\", bigHandler); // never cleaned!\n\n// Fix: remove when done\nbtn.addEventListener(\"click\", bigHandler);\nbtn.removeEventListener(\"click\", bigHandler); // clean up\n\n// Leak: interval runs forever\nsetInterval(poll, 5000); // never stops!\n\n// Fix: store ID and clear\nconst id = setInterval(poll, 5000);\nfunction stop() { clearInterval(id); }\n\n// Release closure references\nfunction noLeak() {\n  let bigData = new Array(1e6).fill(\"x\");\n  const len = bigData.length;\n  bigData = null; // allow garbage collection\n  return () => len;\n}\n\n// React: cleanup in useEffect\nuseEffect(() => {\n  const id = setInterval(poll, 1000);\n  return () => clearInterval(id); // cleanup on unmount!\n}, []);"}, {"id": 81, "cat": "Advanced Concepts", "q": "Explain closures with a practical example.", "a": "Closure = function + reference to its surrounding state. Enables private data, factory functions, and event callbacks.", "ex": "function createCounter(start = 0) {\n  let count = start; // private \u2014 outside access impossible\n\n  return {\n    increment() { return ++count; },\n    decrement() { return --count; },\n    reset()     { count = start; },\n    value()     { return count; },\n  };\n}\n\nconst counter = createCounter(10);\nconsole.log(counter.increment()); // 11\nconsole.log(counter.increment()); // 12\ncounter.reset();\nconsole.log(counter.value());     // 10\n\n// Independent instances \u2014 separate closure scopes\nconst c1 = createCounter();\nconst c2 = createCounter(100);\nc1.increment();\nc2.increment();\nconsole.log(c1.value()); // 1\nconsole.log(c2.value()); // 101"}, {"id": 82, "cat": "Advanced Concepts", "q": "How can closures be used for data privacy?", "a": "Closures hide data inside a function scope, exposing only a public API. Foundation of private state before ES6 private class fields.", "ex": "function createUser(name, password) {\n  let _password      = password; // private\n  let _loginAttempts = 0;        // private\n\n  return {\n    getName() { return name; },\n    login(attempt) {\n      _loginAttempts++;\n      if (attempt === _password) {\n        _loginAttempts = 0;\n        return \"Access granted\";\n      }\n      if (_loginAttempts >= 3) return \"Account locked!\";\n      return \"Wrong password\";\n    },\n    getAttempts() { return _loginAttempts; },\n  };\n}\n\nconst user = createUser(\"Alice\", \"secret\");\nconsole.log(user.login(\"wrong\"));  // \"Wrong password\"\nconsole.log(user.login(\"wrong\"));  // \"Wrong password\"\nconsole.log(user.login(\"wrong\"));  // \"Account locked!\"\n// user._password \u2192 undefined (private!)"}, {"id": 83, "cat": "Advanced Concepts", "q": "What is function currying?", "a": "Transforms a multi-argument function into a chain of single-argument functions. Enables partial application \u2014 pre-filling some arguments.", "ex": "// Regular\nfunction add(a, b, c) { return a + b + c; }\nadd(1, 2, 3); // 6\n\n// Curried\nconst curry = a => b => c => a + b + c;\ncurry(1)(2)(3); // 6\n\n// Partial application\nconst add5 = curry(5);        // a=5\nconst add5and3 = add5(3);     // a=5, b=3\nconsole.log(add5and3(2));     // 10\n\n// Practical: reusable validators\nconst hasMinLength = min => str => str.length >= min;\nconst isLong = hasMinLength(10);\nconsole.log(isLong(\"HelloWorld\")); // true\nconsole.log(isLong(\"Hi\"));        // false"}, {"id": 84, "cat": "Advanced Concepts", "q": "What is memoization?", "a": "Caches results of expensive function calls. Same arguments \u2192 return cached result instead of recomputing. Trades memory for speed.", "ex": "// Without memoization \u2014 very slow for large n\nfunction fib(n) {\n  if (n <= 1) return n;\n  return fib(n-1) + fib(n-2);\n}\n\n// Memoize utility\nfunction memoize(fn) {\n  const cache = new Map();\n  return function(...args) {\n    const key = JSON.stringify(args);\n    if (cache.has(key)) return cache.get(key); // cache hit!\n    const result = fn.apply(this, args);\n    cache.set(key, result);\n    return result;\n  };\n}\n\nconst fastFib = memoize(function fib(n) {\n  if (n <= 1) return n;\n  return fastFib(n-1) + fastFib(n-2);\n});\n\nconsole.log(fastFib(40)); // 102334155 \u2014 instant!\nconsole.log(fastFib(40)); // same \u2014 from cache!"}, {"id": 85, "cat": "Advanced Concepts", "q": "What is immutability?", "a": "Data cannot be changed after creation. Instead of mutating, create new values. Helps predictability, debugging, and React state.", "ex": "// Mutable \u2014 risky\nconst user = { name: \"Alice\", age: 30 };\nuser.age = 31; // direct mutation\n\n// Immutable \u2014 create new object\nconst updated = { ...user, age: 31 }; // original unchanged\n\n// Object.freeze \u2014 shallow immutability\nconst config = Object.freeze({ url: \"https://api.com\" });\nconfig.url = \"changed\"; // silently fails!\nconsole.log(config.url); // \"https://api.com\"\n\n// Immutable array operations\nconst nums = [1,2,3,4,5];\nconst added   = [...nums, 6];\nconst removed = nums.filter(n => n !== 3);\nconst changed = nums.map(n => n === 2 ? 99 : n);\n\n// React: always return new state\nsetUser(prev => ({ ...prev, age: prev.age + 1 }));"}, {"id": 86, "cat": "Advanced Concepts", "q": "What are pure functions?", "a": "A pure function:\n1. Always returns same output for same input (deterministic)\n2. No side effects (no mutation, no I/O, no randomness)", "ex": "// Pure functions\nfunction add(a, b) { return a + b; } // same in \u2192 same out\nfunction double(arr) { return arr.map(x => x * 2); } // new array\n\n// Impure \u2014 depends on external state\nlet tax = 0.1;\nfunction price(p) { return p + p * tax; } // tax can change!\n\n// Impure \u2014 mutates input\nfunction addItem(arr, item) {\n  arr.push(item); // mutates original!\n  return arr;\n}\n\n// Pure version\nfunction addItem(arr, item) {\n  return [...arr, item]; // new array\n}\n\n// Impure \u2014 randomness\nfunction getScore() { return Math.random() * 100; }\n// Different output every call \u2192 impure"}, {"id": 87, "cat": "Advanced Concepts", "q": "What is the factory pattern?", "a": "A function (not class) that creates and returns objects. Consistent object creation without 'new' or 'this'. Supports private state via closures.", "ex": "function createButton(text, color) {\n  let isDisabled = false; // private\n\n  return {\n    text, color,\n    render() {\n      return \"<button\" + (isDisabled ? \" disabled\" : \"\") + \">\" + text + \"</button>\";\n    },\n    disable() { isDisabled = true; },\n    enable()  { isDisabled = false; },\n    isActive(){ return !isDisabled; },\n  };\n}\n\nconst btn1 = createButton(\"Submit\", \"blue\");\nconst btn2 = createButton(\"Cancel\", \"red\");\n\nbtn1.disable();\nconsole.log(btn1.isActive()); // false\nconsole.log(btn2.isActive()); // true \u2014 independent!\n\n// Composition\nconst withLogging = obj => ({\n  ...obj,\n  log() { console.log(JSON.stringify(obj)); }\n});"}, {"id": 88, "cat": "Advanced Concepts", "q": "What is the singleton pattern?", "a": "Ensures only ONE instance exists. Used for shared resources: DB connections, config, loggers. ES6 modules are singletons by default.", "ex": "class Database {\n  static #instance = null;\n\n  constructor(url) {\n    if (Database.#instance) return Database.#instance;\n    this.url  = url;\n    this.conn = false;\n    Database.#instance = this;\n  }\n\n  connect() { this.conn = true; return this; }\n}\n\nconst db1 = new Database(\"mongodb://localhost\");\nconst db2 = new Database(\"mongodb://other\");\n\nconsole.log(db1 === db2); // true \u2014 same instance!\nconsole.log(db2.url);     // \"mongodb://localhost\"\n\n// ES6 Module Singleton (simplest approach)\n// config.js \u2014 evaluated ONCE, shared everywhere\n// export const config = { apiUrl: \"https://api.com\" };"}, {"id": 89, "cat": "Advanced Concepts", "q": "What is the observer/event emitter pattern?", "a": "One-to-many relationship: when subject changes, all subscribers are notified. Foundation of event-driven architecture.", "ex": "class EventEmitter {\n  #events = {};\n\n  on(event, fn) {\n    (this.#events[event] = this.#events[event] || []).push(fn);\n    return this;\n  }\n  off(event, fn) {\n    this.#events[event] = (this.#events[event] || []).filter(f => f !== fn);\n    return this;\n  }\n  emit(event, ...args) {\n    (this.#events[event] || []).forEach(fn => fn(...args));\n    return this;\n  }\n  once(event, fn) {\n    const wrap = (...args) => { fn(...args); this.off(event, wrap); };\n    return this.on(event, wrap);\n  }\n}\n\nconst emitter = new EventEmitter();\nemitter.on(\"data\", d => console.log(\"Got:\", d));\nemitter.once(\"connect\", () => console.log(\"Connected!\"));\nemitter.emit(\"connect\"); // \"Connected!\"\nemitter.emit(\"connect\"); // nothing \u2014 once fired\nemitter.emit(\"data\", { id:1 });"}, {"id": 90, "cat": "Advanced Concepts", "q": "What is the module pattern with closures?", "a": "Uses IIFE + closure to create private state with a public API. Foundational pattern before ES6 modules.", "ex": "const ShoppingCart = (() => {\n  let items    = []; // private\n  let discount = 0;  // private\n\n  function calcTotal() {\n    return items.reduce((s, i) => s + i.price * i.qty, 0) * (1 - discount);\n  }\n\n  return {\n    add(item) {\n      const found = items.find(i => i.id === item.id);\n      found ? found.qty++ : items.push({ ...item, qty:1 });\n    },\n    remove(id) { items = items.filter(i => i.id !== id); },\n    applyDiscount(pct) { discount = pct / 100; },\n    total() { return calcTotal(); },\n    getItems() { return [...items]; }, // copy to protect\n  };\n})();\n\nShoppingCart.add({ id:1, name:\"JS Book\", price:29 });\nShoppingCart.applyDiscount(10);\nconsole.log(ShoppingCart.total()); // 26.1"}, {"id": 91, "cat": "Coding Problems", "q": "Find the sum of an array.", "a": "Multiple approaches: reduce (most idiomatic), for loop. All O(n).", "ex": "// reduce \u2014 most idiomatic\nfunction sum(arr) {\n  return arr.reduce((total, n) => total + n, 0);\n}\nconsole.log(sum([1,2,3,4,5])); // 15\n\n// for...of\nfunction sumFor(arr) {\n  let total = 0;\n  for (const n of arr) total += n;\n  return total;\n}\n\n// Edge cases\nconsole.log(sum([]));           // 0\nconsole.log(sum([5]));          // 5\nconsole.log(sum([-1, 1, 2]));   // 2\nconsole.log(sum([1.5, 2.5, 3])); // 7"}, {"id": 92, "cat": "Coding Problems", "q": "Reverse a string.", "a": "Convert to array, reverse, join back. Multiple valid approaches.", "ex": "// split \u2192 reverse \u2192 join\nfunction reverse(str) {\n  return str.split(\"\").reverse().join(\"\");\n}\nconsole.log(reverse(\"Hello\"));      // \"olleH\"\n\n// Spread\nconst reverse2 = str => [...str].reverse().join(\"\");\n\n// reduce\nconst reverse3 = str => [...str].reduce((rev, c) => c + rev, \"\");\n\n// for loop\nfunction reverse4(str) {\n  let result = \"\";\n  for (let i = str.length - 1; i >= 0; i--)\n    result += str[i];\n  return result;\n}\n\nconsole.log(reverse(\"JavaScript\")); // \"tpircSavaJ\"\nconsole.log(reverse(\"\"));           // \"\" "}, {"id": 93, "cat": "Coding Problems", "q": "Find the largest number in an array.", "a": "Math.max with spread is cleanest. reduce for manual comparison. Handle empty array edge case.", "ex": "// Math.max + spread\nfunction findMax(arr) {\n  if (!arr.length) return null;\n  return Math.max(...arr);\n}\nconsole.log(findMax([3,7,1,9,4])); // 9\n\n// reduce\nfunction findMax2(arr) {\n  return arr.reduce((max, n) => n > max ? n : max, -Infinity);\n}\n\n// Manual loop \u2014 O(n) optimal\nfunction findMax3(arr) {\n  let max = arr[0];\n  for (let i = 1; i < arr.length; i++)\n    if (arr[i] > max) max = arr[i];\n  return max;\n}\n\nconsole.log(findMax([-5,-1,-3])); // -1\nconsole.log(findMax([]));         // null"}, {"id": 94, "cat": "Coding Problems", "q": "Check if a string is a palindrome.", "a": "Compare string with its reverse. Optionally normalize input (lowercase, remove non-alphanumeric).", "ex": "// Basic\nfunction isPalindrome(str) {\n  return str === [...str].reverse().join(\"\");\n}\nconsole.log(isPalindrome(\"racecar\")); // true\nconsole.log(isPalindrome(\"hello\"));  // false\n\n// Case-insensitive, ignore special chars\nfunction isPalindromeClean(str) {\n  const clean = str.toLowerCase().replace(/[^a-z0-9]/g, \"\");\n  return clean === [...clean].reverse().join(\"\");\n}\nconsole.log(isPalindromeClean(\"A man, a plan, a canal: Panama\")); // true\n\n// Two-pointer \u2014 O(n) time, O(1) space\nfunction isPalindromeTP(str) {\n  let
