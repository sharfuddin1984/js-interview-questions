l = 0, r = str.length - 1;\n  while (l < r) {\n    if (str[l] !== str[r]) return false;\n    l++; r--;\n  }\n  return true;\n}"}, {"id": 95, "cat": "Coding Problems", "q": "Remove duplicates from an array.", "a": "Set is the cleanest approach for primitives. For objects, use Map keyed by a property.", "ex": "// Set (cleanest)\nfunction removeDups(arr) { return [...new Set(arr)]; }\nconsole.log(removeDups([1,2,2,3,3,4])); // [1,2,3,4]\n\n// filter + indexOf\nfunction removeDups2(arr) {\n  return arr.filter((v, i) => arr.indexOf(v) === i);\n}\n\n// reduce\nfunction removeDups3(arr) {\n  return arr.reduce((acc, v) =>\n    acc.includes(v) ? acc : [...acc, v], []);\n}\n\n// Objects \u2014 unique by id\nfunction uniqueById(arr) {\n  return [...new Map(arr.map(o => [o.id, o])).values()];\n}\nconst users = [{ id:1, n:\"A\" }, { id:2, n:\"B\" }, { id:1, n:\"A\" }];\nconsole.log(uniqueById(users)); // [{id:1}, {id:2}]"}, {"id": 96, "cat": "Coding Problems", "q": "Implement debounce.", "a": "Delays function execution until N ms have passed since the last call. Uses clearTimeout/setTimeout.", "ex": "function debounce(fn, delay) {\n  let timer = null;\n  return function(...args) {\n    clearTimeout(timer);\n    timer = setTimeout(() => {\n      fn.apply(this, args);\n      timer = null;\n    }, delay);\n  };\n}\n\n// Usage: search input\nconst handleSearch = debounce((query) => {\n  console.log(\"Searching:\", query);\n  fetch(\"/api/search?q=\" + query);\n}, 300);\n\ninput.addEventListener(\"input\", e => handleSearch(e.target.value));\n// Only fires 300ms AFTER user stops typing!\n\n// Leading edge variant (fires immediately, then waits)\nfunction debounceLeading(fn, delay) {\n  let timer;\n  return function(...args) {\n    if (!timer) fn.apply(this, args); // fire immediately\n    clearTimeout(timer);\n    timer = setTimeout(() => timer = null, delay);\n  };\n}"}, {"id": 97, "cat": "Coding Problems", "q": "Implement throttle.", "a": "Ensures function runs at most once per N ms. Uses a boolean flag and setTimeout to reset it.", "ex": "function throttle(fn, limit) {\n  let inThrottle = false;\n  return function(...args) {\n    if (!inThrottle) {\n      fn.apply(this, args);\n      inThrottle = true;\n      setTimeout(() => inThrottle = false, limit);\n    }\n  };\n}\n\n// Usage: scroll handler\nconst handleScroll = throttle(() => {\n  console.log(\"Scroll:\", Date.now());\n  updateProgressBar();\n}, 100); // max once per 100ms\n\nwindow.addEventListener(\"scroll\", handleScroll);\n\n// Throttle with trailing call\nfunction throttleTrailing(fn, limit) {\n  let timer, last;\n  return function(...args) {\n    last = args;\n    if (!timer) {\n      fn.apply(this, args);\n      timer = setTimeout(() => {\n        timer = null;\n        fn.apply(this, last);\n      }, limit);\n    }\n  };\n}"}, {"id": 98, "cat": "Coding Problems", "q": "Flatten a nested array.", "a": "flat(Infinity) is the built-in solution. Implement recursively or with a stack for custom solutions.", "ex": "// Built-in\nfunction flatten(arr) { return arr.flat(Infinity); }\nconsole.log(flatten([1,[2,[3,[4]]]])); // [1,2,3,4]\n\n// Recursive\nfunction flattenRec(arr) {\n  return arr.reduce((flat, item) =>\n    flat.concat(Array.isArray(item) ? flattenRec(item) : item), []);\n}\n\n// Iterative stack (avoids call stack overflow)\nfunction flattenStack(arr) {\n  const stack = [...arr], result = [];\n  while (stack.length) {\n    const item = stack.shift();\n    Array.isArray(item) ? stack.unshift(...item) : result.push(item);\n  }\n  return result;\n}\n\n// Controlled depth\nfunction flattenDepth(arr, depth = 1) {\n  return depth > 0\n    ? arr.reduce((acc, v) =>\n        acc.concat(Array.isArray(v) ? flattenDepth(v, depth-1) : v), [])\n    : arr.slice();\n}"}, {"id": 99, "cat": "Coding Problems", "q": "Implement a simple pub/sub pattern.", "a": "Pub/Sub decouples publishers and subscribers. Publishers emit events; subscribers react without knowing who published.", "ex": "function createPubSub() {\n  const subs = {};\n\n  return {\n    subscribe(event, callback) {\n      (subs[event] = subs[event] || []).push(callback);\n      // Return unsubscribe function\n      return () => {\n        subs[event] = subs[event].filter(cb => cb !== callback);\n      };\n    },\n    publish(event, data) {\n      (subs[event] || []).forEach(cb => cb(data));\n    },\n  };\n}\n\nconst pubsub = createPubSub();\n\nconst unsub = pubsub.subscribe(\"login\", u => console.log(\"User:\", u.name));\npubsub.subscribe(\"login\", u => updateUI(u));\n\npubsub.publish(\"login\", { name: \"Alice\" }); // both run\nunsub(); // unsubscribe first\npubsub.publish(\"login\", { name: \"Bob\" });   // only second runs"}, {"id": 100, "cat": "Coding Problems", "q": "Implement a basic Promise.all.", "a": "Resolves when ALL promises resolve (preserving order), rejects when ANY rejects.", "ex": "function myPromiseAll(promises) {\n  return new Promise((resolve, reject) => {\n    if (!promises.length) { resolve([]); return; }\n\n    const results = new Array(promises.length);\n    let resolved = 0;\n\n    promises.forEach((promise, index) => {\n      Promise.resolve(promise) // handle non-promise values\n        .then(value => {\n          results[index] = value; // preserve order!\n          resolved++;\n          if (resolved === promises.length) resolve(results);\n        })\n        .catch(reject); // first rejection propagates\n    });\n  });\n}\n\n// Test it\nconst p1 = Promise.resolve(1);\nconst p2 = new Promise(res => setTimeout(() => res(2), 100));\nconst p3 = Promise.resolve(3);\n\nmyPromiseAll([p1, p2, p3]).then(console.log); // [1, 2, 3]\n\n// Rejection test\nmyPromiseAll([p1, Promise.reject(\"Oops!\"), p3])\n  .catch(err => console.log(\"Rejected:\", err));"}]
</script>

<div class="header">
  <div class="badge">Frontend Interview Prep &mdash; Mohd Sharfuddin Khan</div>
  <h1>100 JavaScript Interview Q&amp;A</h1>
  <div class="sub">100 questions &middot; 10 topics &middot; click any card to expand</div>
  <div class="search-wrap">
    <span>&#128269;</span>
    <input id="searchInput" type="text" placeholder="Search questions or answers..."/>
  </div>
</div>

<div class="filters"><div class="filter-inner" id="filterBar"></div></div>
<div class="stats" id="stats"></div>
<div class="list" id="qlist"></div>

<script>

(function(){
  var QA = JSON.parse(document.getElementById("QA_DATA").textContent);

  var CAT_COLORS = {
    "Basics & Syntax":      "#f59e0b",
    "Functions & Scope":    "#10b981",
    "Arrays & Objects":     "#3b82f6",
    "Loops & Control Flow": "#8b5cf6",
    "DOM & Events":         "#ef4444",
    "Async JS":             "#06b6d4",
    "OOP & ES6+":           "#f97316",
    "Error & Performance":  "#ec4899",
    "Advanced Concepts":    "#84cc16",
    "Coding Problems":      "#a855f7"
  };

  var CATS = ["All"].concat(Object.keys(CAT_COLORS));
  var activeCat = "All";
  var srch = "";
  var bookmarks = {};
  var openId = null;

  function clr(cat){ return CAT_COLORS[cat] || "#6b7280"; }

  function escHtml(s){
    return String(s)
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;");
  }

  function highlight(code){
    var kws = ["const","let","var","function","return","class","extends",
               "new","this","import","export","default","async","await",
               "if","else","for","while","switch","case","break",
               "continue","try","catch","finally","throw","typeof",
               "instanceof","in","of","static","get","set",
               "null","undefined","true","false"];

    var lines = code.split("\n");

    var out = lines.map(function(line){

      // 1. Find comment start — but only outside strings
      var cmtIdx = -1;
      var inStr = false;
      var strChar = "";
      for(var i = 0; i < line.length - 1; i++){
        var ch = line[i];
        if(!inStr && (ch === '"' || ch === "'")){
          inStr = true; strChar = ch;
        } else if(inStr && ch === strChar && line[i-1] !== "\\"){
          inStr = false;
        } else if(!inStr && ch === "/" && line[i+1] === "/"){
          cmtIdx = i; break;
        }
      }

      var codePart = cmtIdx === -1 ? line : line.slice(0, cmtIdx);
      var cmtPart  = cmtIdx === -1 ? ""   : line.slice(cmtIdx);

      // 2. Escape only < and > and & in code (keep quotes as-is so strings render)
      var s = escHtml(codePart);

      // 3. Highlight quoted strings — match "..." and '...'
      s = s.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,
                    "<span class='str'>$1</span>");

      // 4. Highlight keywords — skip inside str spans
      kws.forEach(function(k){
        // Only replace outside of span tags
        s = s.replace(new RegExp("(?<![\\w$.-])(" + k + ")(?![\\w$])", "g"),
          function(match, p1, offset, str){
            // Check if inside a span by counting unclosed spans before this offset
            var before = str.slice(0, offset);
            var opens  = (before.match(/<span/g)  || []).length;
            var closes = (before.match(/<\/span>/g) || []).length;
            return opens > closes ? match : "<span class='kw'>" + p1 + "</span>";
          });
      });

      // 5. Highlight numbers (not inside spans)
      s = s.replace(/(?<![.\w"'#-])(\d+(?:\.\d+)?n?)(?![\w"'])/g,
        function(match, p1, offset, str){
          var before = str.slice(0, offset);
          var opens  = (before.match(/<span/g)  || []).length;
          var closes = (before.match(/<\/span>/g) || []).length;
          return opens > closes ? match : "<span class='num'>" + p1 + "</span>";
        });

      // 6. Append comment span
      if(cmtPart){
        s += "<span class='cmt'>" + escHtml(cmtPart) + "</span>";
      }

      return s;
    });

    return out.join("\n");
  }

  function getFiltered(){
    var s = srch.toLowerCase();
    return QA.filter(function(q){
      var ms = !s || q.q.toLowerCase().indexOf(s)!==-1 || q.a.toLowerCase().indexOf(s)!==-1;
      var mc = activeCat==="All" || q.cat===activeCat;
      return ms && mc;
    });
  }

  function renderFilters(){
    var bar = document.getElementById("filterBar");
    var parts = CATS.map(function(cat){
      var active = activeCat===cat;
      var c = cat==="All" ? "#3b82f6" : clr(cat);
      var st = active ? "background:"+c+";border-color:"+c+";" : "";
      var lbl = cat==="All" ? "All (100)" : cat;
      return '<button class="fbtn'+(active?" active":"")+'" style="'+st+'" data-cat="'+cat+'">'+lbl+'</button>';
    });
    parts.push('<button class="fbtn" style="color:#f59e0b;border-color:rgba(245,158,11,.3)" id="savedBtn">&#9733; Saved ('+Object.keys(bookmarks).length+')</button>');
    bar.innerHTML = parts.join("");

    bar.querySelectorAll("[data-cat]").forEach(function(btn){
      btn.addEventListener("click", function(){
        activeCat = this.getAttribute("data-cat");
        openId = null;
        renderFilters();
        renderList();
      });
    });
    var sb = document.getElementById("savedBtn");
    if(sb) sb.addEventListener("click", function(){
      var ids = Object.keys(bookmarks);
      if(!ids.length) return;
      // toggle saved filter
      if(window._showingSaved){
        window._showingSaved = false;
        this.style.background = "";
      } else {
        window._showingSaved = true;
        this.style.background = "rgba(245,158,11,.15)";
      }
      renderList();
    });
  }

  function makePanel(q, c){
    var d = document.createElement("div");
    d.className = "apanel";

    var at = document.createElement("div");
    at.className = "atext";
    var lbl = document.createElement("span");
    lbl.className = "alabel";
    lbl.style.color = c;
    lbl.textContent = "Answer";
    at.appendChild(lbl);
    at.appendChild(document.createTextNode(q.a));
    d.appendChild(at);

    var cw = document.createElement("div");
    cw.className = "codewrap";
    var ct = document.createElement("div");
    ct.className = "codetop";
    var lang = document.createElement("span");
    lang.className = "codelang";
    lang.textContent = "JAVASCRIPT";
    var cpBtn = document.createElement("button");
    cpBtn.className = "copybtn";
    cpBtn.textContent = "Copy";
    cpBtn.addEventListener("click", function(){
      if(navigator.clipboard){
        navigator.clipboard.writeText(q.ex).then(function(){
          cpBtn.textContent = "Copied!";
          cpBtn.className = "copybtn ok";
          setTimeout(function(){ cpBtn.textContent="Copy"; cpBtn.className="copybtn"; }, 2000);
        });
      }
    });
    ct.appendChild(lang);
    ct.appendChild(cpBtn);

    var pre = document.createElement("pre");
    pre.className = "codebody";
    pre.innerHTML = highlight(q.ex);

    cw.appendChild(ct);
    cw.appendChild(pre);
    d.appendChild(cw);
    return d;
  }

  function renderList(){
    var filtered = getFiltered();
    if(window._showingSaved){
      filtered = filtered.filter(function(q){ return !!bookmarks[q.id]; });
    }
    var stats = document.getElementById("stats");
    stats.textContent = "Showing "+filtered.length+" question"+(filtered.length!==1?"s":"");

    var list = document.getElementById("qlist");
    list.innerHTML = "";

    if(!filtered.length){
      var empty = document.createElement("div");
      empty.className = "empty";
      empty.innerHTML = '<div style="font-size:2rem;margin-bottom:.5rem">&#128269;</div>No questions match.';
      list.appendChild(empty);
      return;
    }

    filtered.forEach(function(q){
      var c = clr(q.cat);
      var isOpen = openId===q.id;
      var isSaved = !!bookmarks[q.id];

      var card = document.createElement("div");
      card.className = "card"+(isOpen?" open":"");
      card.id = "c"+q.id;

      // head
      var head = document.createElement("div");
      head.className = "qhead";

      var num = document.createElement("div");
      num.className = "qnum";
      num.textContent = q.id;
      num.style.cssText = "background:"+c+"22;border:1px solid "+c+"55;color:"+c;

      var meta = document.createElement("div");
      meta.className = "qmeta";
      var catEl = document.createElement("span");
      catEl.className = "qcat";
      catEl.style.color = c;
      catEl.textContent = q.cat;
      var titleEl = document.createElement("div");
      titleEl.className = "qtitle";
      titleEl.textContent = q.q;
      meta.appendChild(catEl);
      meta.appendChild(titleEl);

      var right = document.createElement("div");
      right.className = "qright";
      var bmBtn = document.createElement("button");
      bmBtn.className = "bmbtn"+(isSaved?" on":"");
      bmBtn.innerHTML = isSaved ? "&#9733;" : "&#9734;";
      bmBtn.addEventListener("click", function(e){
        e.stopPropagation();
        if(bookmarks[q.id]) delete bookmarks[q.id];
        else bookmarks[q.id]=true;
        renderFilters();
        renderList();
      });
      var chev = document.createElement("span");
      chev.className = "chev";
      chev.innerHTML = "&#9660;";
      chev.style.color = isOpen ? c : "#374151";
      right.appendChild(bmBtn);
      right.appendChild(chev);

      head.appendChild(num);
      head.appendChild(meta);
      head.appendChild(right);
      head.addEventListener("click", function(){
        openId = openId===q.id ? null : q.id;
        renderFilters();
        renderList();
        if(openId===q.id){
          setTimeout(function(){
            var el=document.getElementById("c"+q.id);
            if(el) el.scrollIntoView({behavior:"smooth",block:"nearest"});
          },50);
        }
      });

      card.appendChild(head);
      if(isOpen) card.appendChild(makePanel(q, c));
      list.appendChild(card);
    });
  }

  document.getElementById("searchInput").addEventListener("input", function(){
    srch = this.value;
    openId = null;
    renderList();
  });

  renderFilters();
  renderList();
})();

</script>
</body>
</html>
